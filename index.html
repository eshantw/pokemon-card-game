<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon TCG Pro: Quiz Battle - Ultra Edition</title>
    <style>
        :root{--team1-color:#2a75bb;--team2-color:#e3350d;--color-fire:#ff9d55;--color-water:#5090d6;--color-grass:#63bc5a;--color-electric:#f4d23c;--color-normal:#a8a878;--color-brown:#a0522d;--color-purple:#9b59b6;--color-any:#eeeeee}
        *{box-sizing:border-box;margin:0;padding:0;font-family:'Noto Sans TC',Arial,sans-serif;user-select:none}
        
        body{background:#0a0a0c;color:#fff;width:100vw;height:100vh;overflow:hidden;display:flex;flex-direction:column;}
        #fx-canvas{position:fixed;top:0;left:0;width:100vw;height:100vh;pointer-events:none;z-index:9999}

        #lobby{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;z-index:20;background:#0a0a0c;position:absolute;width:100%;height:100%;overflow-y:auto;}
        .config-box{position:relative; z-index:10; background:#111;padding:30px;border-radius:24px;border:2px solid #ffcb05;width:100%;max-width:850px;text-align:center;box-shadow:0 0 30px rgba(255,203,5,.2); margin: auto; transform-origin: center center;}
        
        .upload-section { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; margin: 10px 0; border: 2px dashed #666; text-align: left; display: flex; flex-direction: column; min-height: 220px;}
        .cloud-input { width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: 1px solid #444; background: #000; color: #77cc55; font-size: 13px; outline:none; }
        .cloud-input:focus { border-color: #ffcb05; }
        #qInput { width: 100%; flex: 1; min-height: 50px; margin-bottom: 10px; padding: 12px; border-radius: 8px; font-size: 14px; background: #000; color: #fff; border: 1px solid #444; resize: none;}

        .lobby-mascot { position: fixed; bottom: 5%; width: 260px; max-width: 25vw; filter: drop-shadow(0 10px 10px rgba(0,0,0,0.5)); animation: bounce 1.5s infinite alternate ease-in-out; pointer-events: none; z-index: 9999;}
        .mascot-left { left: 2%; }
        .mascot-right { right: 2%; animation-delay: 0.75s; }
        @keyframes bounce { 0% { transform: translateY(0); } 100% { transform: translateY(-20px); } }
        
        .start-btn-content { display: flex; align-items: center; justify-content: center; gap: 12px; }
        .pokeball-icon { width: 28px; height: 28px; }

        #battle-field { position: relative; width: 100vw; height: 100vh; background: #0a0a0c; overflow: hidden; }
        #battle-scale-wrapper { width: 1280px; height: 720px; position: absolute; left: 50%; top: 50%; display: flex; flex-direction: column; }
        .battle-main { flex:1; display:flex; justify-content:space-between; align-items:stretch; padding:20px 10px; gap:15px; }
        
        .team-container { width:510px; display:flex; flex-direction:column; justify-content:space-between; gap:10px; padding:20px 15px; border-radius:25px; background:rgba(255,255,255,.03); border:3px solid transparent; transition:.3s;}
        .team-container.active-team{border-color:#00f2ff;background:linear-gradient(180deg,rgba(0,242,255,.05) 0,rgba(0,100,255,.15) 100%);box-shadow:0 0 30px rgba(0,242,255,.6),inset 0 0 20px rgba(0,150,255,.4);animation:neonPulse 2s infinite alternate}
        @keyframes neonPulse{0%{box-shadow:0 0 15px rgba(0,242,255,.4),inset 0 0 10px rgba(0,150,255,.3);border-color:#00c3ff}100%{box-shadow:0 0 35px rgba(0,242,255,.8),inset 0 0 25px rgba(0,150,255,.6);border-color:#00f2ff}}
        
        .field-area { display:flex; gap:15px; align-items:center; justify-content:center; }
        .bench-grid { display:grid; grid-template-columns:repeat(2,120px); grid-template-rows:repeat(2,auto); gap:10px; justify-content:center; }
        .active-zone { flex:0 0 auto; display:flex; justify-content:center; align-items:center; padding:6px; border:2px dashed #444; border-radius:12px; margin: 0 5px; }
        
        .hand-wrapper { position: relative; width: 100%; margin-top: auto; }
        .hand-tooltip { position: absolute; bottom: 100%; margin-bottom: 5px; left: 50%; transform: translateX(-50%); width: 95%; background: rgba(20, 20, 20, 0.9); color: #ffcb05; padding: 8px 12px; border-radius: 8px; font-size: 14px; font-weight: bold; text-align: center; border: 2px solid #ffcb05; z-index: 100; pointer-events: none; opacity: 0; transition: opacity 0.2s ease-in-out; box-shadow: 0 5px 15px rgba(0,0,0,0.7); line-height: 1.4; }
        .hand-tooltip.show { opacity: 1; }
        
        .hand-area{height:110px; background:rgba(0,0,0,.6); border-radius:12px; padding:8px; display:flex; flex-wrap:nowrap; gap:8px; align-items:center; justify-content:center; overflow:hidden;}
        .hand-card{position:relative; flex: 1 1 0; max-width:65px; min-width:35px; height:95px; border-radius:8px; padding:4px; cursor:pointer; text-align:center; font-size:12px; font-weight:700; border:2px solid #fff; transition:.2s; box-shadow:0 4px 8px rgba(0,0,0,.5); display:flex; flex-direction:column; align-items:center; justify-content:center; line-height:1.1}
        .hand-card:hover{transform:translateY(-8px) scale(1.1);filter:brightness(1.2);z-index:50;}
        .hand-card.selected{border-color:#0f0;transform:translateY(-10px);box-shadow:0 0 15px rgba(0,255,0,.5)}
        .hand-energy{background:#333}
        .hand-trainer{background:linear-gradient(135deg,#eee,#aaa);color:#222}

        .center-panel{width:210px; display:flex; flex-direction:column; align-items:center; justify-content:flex-start; padding:20px 10px; gap:10px; align-self: stretch;}
        #log{flex:1; width:100%; background:rgba(0,0,0,.7); border:1px solid #333; border-radius:8px; padding:10px; font-size:14px; color:#eee; overflow-y:auto; display:flex; flex-direction:column; gap:8px;}
        .log-entry{border-bottom:1px solid #222; padding-bottom:5px; animation:slideIn .3s ease-out; opacity:1 !important; line-height:1.4;}
        @keyframes slideIn{from{opacity:0;transform:translateX(10px)}to{opacity:1;transform:translateX(0)}}

        .card{flex-shrink:0; background:#fff;border-radius:8px;color:#222;padding:6px;font-size:12px;cursor:pointer;transition:transform .2s,box-shadow .2s;position:relative;border:3px solid transparent;box-shadow:0 6px 12px rgba(0,0,0,.5);display:flex;flex-direction:column;overflow:hidden}
        .card-active{width:180px; transform: scale(1.05);}
        .card-active .card-img{height:90px}
        .card-bench{width:120px}
        .card-bench .card-img{height:70px}
        .card-bench .attack-row{padding:3px;font-size:10px;margin-top:3px}
        
        .card.type-fire{background:var(--color-fire)}
        .card.type-water{background:var(--color-water)}
        .card.type-grass{background:var(--color-grass)}
        .card.type-electric{background:var(--color-electric)}
        .card.type-normal{background:var(--color-normal)}
        .card.type-brown{background:var(--color-brown)}
        .card.type-purple{background:var(--color-purple)}

        .card:hover{transform:translateY(-3px) scale(1.03);z-index:5}
        .card.is-active-fighter{border-color:gold;box-shadow:0 0 20px rgba(255,215,0,.6); z-index:10;}
        .card.dead{filter:grayscale(100%);opacity:.5;pointer-events:none;}
        .card.dead.revivable{pointer-events:auto;animation:pulse 1.5s infinite;border-color:#0f0;opacity:.8;filter:grayscale(30%)}
        .card.valid-target{border-color:#0f0;box-shadow:0 0 15px #0f0;animation:pulse 1.5s infinite}
        @keyframes pulse{0%,100%{box-shadow:0 0 5px #0f0}50%{box-shadow:0 0 20px #0f0}100%{box-shadow:0 0 5px #0f0}}

        .active-header { display:flex; flex-direction:row; justify-content:space-between; align-items:center; margin-left:20px; font-weight:900; margin-bottom:4px; font-size:14px;}
        .bench-header { display:flex; flex-direction:column; align-items:flex-start; margin-left:18px; font-weight:900; margin-bottom:4px; line-height:1.2; }
        .bench-header .name-text { font-size:12px; margin-bottom:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:100%; }
        .bench-header .hp-text { font-size:11px; font-weight:900; }
        
        .card-img{width:100%;background:white;border-radius:4px;display:flex;align-items:center;justify-content:center;overflow:hidden;border:2px solid #333;position:relative}
        .card-img img{width:85%;height:85%;object-fit:contain}
        .inspect-btn{position:absolute;top:-5px;left:-5px;background:rgba(0,0,0,.8);color:white;border-radius:50%;width:24px;height:24px;display:flex;justify-content:center;align-items:center;z-index:10;transition:transform .2s;border:1px solid #fff}
        .inspect-btn:hover{transform:scale(1.2);background:#ffcb05;color:black}
        
        .buff-container{position:absolute;top:4px;right:4px;display:flex;gap:3px;flex-direction:column;align-items:flex-end;z-index:5}
        .item-tag{background:#ffcb05;color:black;padding:3px 5px;border-radius:6px;font-size:9px;font-weight:bold;box-shadow:0 2px 4px rgba(0,0,0,.5);border:1px solid #000}
        #inspect-content .item-tag{font-size:14px;padding:4px 8px;border-radius:8px;}

        .status-container{position:absolute;bottom:3px;left:3px;display:flex;gap:2px;flex-wrap:wrap;z-index:5}
        .status-tag{padding:2px 4px;border-radius:3px;font-size:8px;font-weight:bold;color:white;border:1px solid rgba(255,255,255,.5)}
        .status-poison{background-color:#904090}
        .status-paralyze{background-color:#f4d23c;color:#000}
        .status-burn{background-color:#f40}
        .status-asleep{background-color:#555}
        .status-confused{background-color:#f90}
        
        .energy-container{display:flex;flex-wrap:wrap;gap:2px;margin-top:3px;min-height:14px;background:rgba(255,255,255,.3);border-radius:4px;padding:2px}
        .energy-icon{width:12px;height:12px;border-radius:50%;border:1px solid #000;display:inline-block;box-shadow:0 1px 2px rgba(0,0,0,0.5);}
        .energy-fire{background:var(--color-fire)}
        .energy-water{background:var(--color-water)}
        .energy-grass{background:var(--color-grass)}
        .energy-electric{background:var(--color-electric)}
        .energy-normal{background:var(--color-normal)}
        .energy-brown{background:var(--color-brown)}
        .energy-purple{background:var(--color-purple)}
        .energy-any{background:var(--color-any)}
        .energy-rainbow{background:conic-gradient(red,yellow,lime,aqua,blue,magenta,red)}
        
        .attack-row { margin-top: 4px; padding: 4px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.2s; border: 1px solid rgba(0,0,0,0.1); background: rgba(255,255,255,0.1); color: #222;}
        .attack-ready { background: rgba(255,255,255,0.95) !important; opacity: 1; box-shadow: 0 0 5px rgba(255,255,255,0.6); }
        .attack-ready:hover { transform: scale(1.02); background: #fff !important; }
        .attack-disabled { background: rgba(255,255,255,0.3) !important; opacity: 1; cursor: not-allowed; }
        .attack-disabled span { color: #333; } 
        .attack-special-icon { font-size: 9px; margin-left: 2px; color: #555; }
        
        .bench-attack-preview { margin-top:4px; display:flex; flex-direction:column; gap:3px; align-items:flex-start; background:rgba(255,255,255,0.1); border-radius:4px; padding:4px; }
        .bench-attack-preview > div { display:flex; gap:2px; justify-content:flex-start; }

        .hp-bar{height:6px;background:#333;border-radius:3px;margin:3px 0;overflow:hidden;border:1px solid #000}
        .hp-fill{height:100%;background:#4caf50;transition:width .3s}

        .game-modal{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.92);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:10000; border-radius: 20px;}
        .modal{position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,.95);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:20000}
        .modal-box{background:#1a1a1a;padding:30px;border-radius:20px;max-width:1000px;width:95%;text-align:center;border:2px solid #ffcb05;position:relative}
        .btn{padding:10px 20px;border-radius:8px;cursor:pointer;font-weight:bold;border:none;font-size:14px;transition:.3s;width:100%;display:block;margin-bottom:8px;}
        .btn:not(:disabled):hover{filter:brightness(1.3);transform:translateY(-2px)}
        .btn-disabled{opacity:0.4;cursor:not-allowed;}
        
        #setup-ui { display: flex; flex-direction: column; width: 100%; gap: 5px; margin-bottom: 10px; }

        .kahoot-btn { padding: 20px 30px; border-radius: 16px; border: none; color: white; font-weight: bold; cursor: pointer; transition: 0.2s; box-shadow: 0 6px 0 rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: flex-start; min-height: 130px; max-height: 180px; flex: 1 1 calc(50% - 30px); overflow: hidden; box-sizing: border-box;}
        .kahoot-btn:hover { filter: brightness(1.15); transform: translateY(-3px); box-shadow: 0 8px 0 rgba(0,0,0,0.3); }
        .kahoot-btn:active { transform: translateY(6px); box-shadow: 0 0 0 rgba(0,0,0,0.3); }
        .kb-red { background-color: #e21b3c; }
        .kb-blue { background-color: #1368ce; }
        .kb-yellow { background-color: #d89e00; }
        .kb-green { background-color: #26890c; }

        #inspect-content .card{width:320px;font-size:16px;padding:15px;cursor:default;box-shadow:0 0 40px rgba(255,255,255,.5)}
        #inspect-content .card-img{height:160px}
        #inspect-content .energy-icon{width:20px;height:20px}
        #inspect-content .attack-row{font-size:16px;padding:12px;margin-top:10px;}
        
        .hidden{display:none!important}
        
        .damage-pop{position:fixed;color:#f00;font-size:55px;font-weight:900;text-shadow:0 0 12px #fff;pointer-events:none;z-index:20001;animation:popUp 1s forwards}
        /* 💡 新增：綠色補血文字動畫特效 */
        .heal-pop{position:fixed;color:#4caf50;font-size:55px;font-weight:900;text-shadow:0 0 12px #fff;pointer-events:none;z-index:20001;animation:popUp 1s forwards}
        @keyframes popUp{0%{transform:scale(.5);opacity:1}100%{transform:translateY(-80px) scale(1.5);opacity:0}}
        
        .close-btn{position:absolute;top:10px;right:15px;font-size:24px;cursor:pointer;color:#000;font-weight:bold;transition:.2s}
        .close-btn:hover{transform:scale(1.2);color:#fff}
        
        .coin-container{perspective:1000px;margin:20px auto;width:150px;height:150px;cursor:pointer; transition:transform .2s}
        .coin-container:hover{transform:scale(1.1)}
        .coin-container.flipping{pointer-events:none}
        .coin{width:100%;height:100%;position:relative;transform-style:preserve-3d; transition: transform 2s cubic-bezier(0.2, 0.8, 0.3, 1);}
        .coin-face{position:absolute;width:100%;height:100%;border-radius:50%;backface-visibility:hidden;display:flex;align-items:center;justify-content:center;font-size:40px;font-weight:bold;box-shadow:0 0 20px rgba(0,0,0,.6); border:6px solid #333;}
        .coin-heads{background:linear-gradient(to bottom,#f44336 50%,#fff 50%);}
        .coin-heads::after{content:'';position:absolute;width:100%;height:8px;background:#333;top:50%;transform:translateY(-50%)}
        .coin-heads::before{content:'';position:absolute;width:36px;height:36px;background:#fff;border:6px solid #333;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);z-index:2}
        .coin-tails{background:#333;color:#fff;transform:rotateY(180deg);border-color:#888;}
    </style>
</head>
<body>

<canvas id="fx-canvas"></canvas>

<!-- 系統彈窗 -->
<div id="sys-alert" class="modal" style="z-index: 99999;">
    <div class="modal-box" style="border-color: #ff4444; padding: 40px; max-width: 500px;">
        <div id="sys-alert-msg" style="font-size: 24px; margin-bottom: 30px; line-height:1.5;"></div>
        <button class="btn" style="background:#ffcb05; color:black; font-size:18px; padding:10px 40px; width:auto; margin:0 auto;" onclick="document.getElementById('sys-alert').style.display='none'">確定</button>
    </div>
</div>

<div id="sys-confirm" class="modal" style="z-index: 99999;">
    <div class="modal-box" style="border-color: #ffcb05; padding: 40px; max-width: 500px;">
        <div id="sys-confirm-msg" style="font-size: 24px; margin-bottom: 30px; line-height:1.5;"></div>
        <div style="display:flex; gap:20px; justify-content:center;">
            <button id="sys-confirm-yes" class="btn" style="background:var(--team1-color); color:white; font-size:18px; padding:10px 30px; width:auto; margin:0;">確定</button>
            <button class="btn" style="background:var(--team2-color); color:white; font-size:18px; padding:10px 30px; width:auto; margin:0;" onclick="document.getElementById('sys-confirm').style.display='none'">取消</button>
        </div>
    </div>
</div>

<div id="lobby">
    <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/25.png" class="lobby-mascot mascot-left">
    <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/4.png" class="lobby-mascot mascot-right">
    
    <div class="config-box">
        <h1 style="color: #ffcb05; margin-bottom: 10px; font-size: 36px;">Pokémon TCG Pro</h1>
        <p style="margin-bottom: 20px; color: #aaa;">終極平衡版：七大屬性升級 & 直覺圖示化介面！</p>
        
        <div style="display:flex; gap:20px; margin-top:10px;">
            <div class="upload-section" style="flex:1;">
                <h3 style="color: #77cc55; margin-bottom:8px;">🌐 模式 A：Google 試算表</h3>
                <p style="font-size:11px; color:#ccc; margin-bottom:10px;">格式：題號 | 題目 | 選項... | 答案</p>
                <input type="text" id="cloud-url" class="cloud-input" placeholder="貼上 Google 試算表分享網址" style="margin-bottom:10px;">
                <button class="btn" style="background:#77cc55; color:#000; padding:10px; font-weight:bold; margin-top:auto;" onclick="fetchCloudCSV()">載入連結</button>
                <div id="cloud-status" style="color: #ffcb05; font-size: 13px; font-weight:bold; margin-top:8px;"></div>
            </div>
            
            <div class="upload-section" style="flex:1;">
                <h3 style="color: #3399ff; margin-bottom:8px;">📝 模式 B：手動輸入題庫</h3>
                <p style="font-size:11px; color:#ccc; margin-bottom:10px;">由老師判定答對或答錯。多題請用 / 分隔：</p>
                <textarea id="qInput" placeholder="題目1 / 題目2 / ..."></textarea>
                <button class="btn" style="background:#3399ff; color:#fff; padding:10px; font-weight:bold; margin-top:auto;" onclick="loadManualQs()">確認題庫</button>
            </div>
        </div>

        <div class="upload-section mode-c" style="text-align: center; border: 2px dashed #666; margin-top: 15px;">
            <h3 style="color: #ff9d55; margin-bottom:5px;">📁 模式 C：上傳本地 CSV 檔案</h3>
            <p style="font-size:11px; color:#ccc; margin-bottom:10px;">第一欄填題號，最後一欄填解答數字(1-4)</p>
            <input type="file" id="csv-file" accept=".csv" style="color:white; font-size:14px; margin: 0 auto; display: block;" onchange="loadLocalCSV(event)">
        </div>

        <button class="btn" style="background:#ffcb05; color:black; width:260px; margin:15px auto 0; padding:12px; font-size:24px; border-radius:30px; font-weight:900; letter-spacing:2px;" onclick="initGame()">
            <div class="start-btn-content">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Pok%C3%A9_Ball_icon.svg" class="pokeball-icon">
                START
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Pok%C3%A9_Ball_icon.svg" class="pokeball-icon">
            </div>
        </button>

        <div style="text-align: center; margin-top: 20px;">
            <button class="btn" style="background:#444; color:#fff; width:200px; font-size:12px; opacity:0.6; margin: 0 auto;" onclick="uploadDataToFirestore()">☁️ 同步角色資料至雲端</button>
        </div>
    </div>
</div>

<div id="battle-field" class="hidden">
    <div id="battle-scale-wrapper" style="height: 720px;">
        <div class="battle-main">
            <!-- TEAM 1 -->
            <div id="side-1" class="team-container">
                <div id="header-1" style="display:flex; justify-content:center; align-items:center; gap:10px;"></div>
                <div class="field-area" id="field-1"></div>
                <div class="hand-wrapper">
                    <div id="hand-tooltip-1" class="hand-tooltip"></div>
                    <div style="font-size: 12px; margin-bottom: 4px; font-weight:bold; color:#ccc;">手牌區 (最多7張)：</div>
                    <div class="hand-area" id="hand-1"></div>
                </div>
            </div>

            <div class="center-panel">
                <h2 id="turn-indicator" style="margin-bottom: 8px; font-size: 18px; font-weight:900; text-align: center; color: #ffcb05; text-shadow: 0 0 8px rgba(255, 203, 5, 0.8);"></h2>
                <div id="action-hint" style="color: #bbb; font-size: 13px; text-align: center; margin-bottom: 8px; min-height: 35px; line-height:1.4;"></div>
                
                <div id="setup-ui">
                    <button id="btn-redraw" class="btn" style="background:#ffcb05; color:black; font-size:16px;" onclick="redrawCards()">🔄 重抽卡牌 (2)</button>
                    <button class="btn" style="background:var(--team1-color); color:white; font-size:16px;" onclick="startGame(1)">▶ TEAM 1 先攻</button>
                    <button class="btn" style="background:var(--team2-color); color:white; font-size:16px;" onclick="startGame(2)">▶ TEAM 2 先攻</button>
                </div>
                
                <button id="end-turn-btn" class="btn" style="background:#333; color:white; display: none; font-size:16px;" onclick="endTurn()">結束回合</button>
                <div id="log"></div>
            </div>

            <!-- TEAM 2 -->
            <div id="side-2" class="team-container">
                <div id="header-2" style="display:flex; justify-content:center; align-items:center; gap:10px;"></div>
                <div class="field-area" id="field-2"></div>
                <div class="hand-wrapper">
                    <div id="hand-tooltip-2" class="hand-tooltip"></div>

<script src="data.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBHI3N7AJZIQiG-an7TG92tw7hJZgM640g",
        authDomain: "pokemon-card-game-9e185.firebaseapp.com",
        projectId: "pokemon-card-game-9e185",
        storageBucket: "pokemon-card-game-9e185.firebasestorage.app",
        messagingSenderId: "203475229504",
        appId: "1:203475229504:web:a090439704d6631bc578a5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.state = {
        quizMode: 'manual', questions: [], csvQuestions: [], qIdx: 0, currentTeam: 1, step: 'quiz', selectedHandItem: null, hasAttachedEnergyThisTurn: false,
        pendingAttack: null, pendingCatcherTarget: null, eotFlips: [], coinFlipReason: '', coinFlipsQueue: 0, coinFlipsResults: 0, transformingPokemon: null, isAttacking: false, redrawsLeft: 2, nextTurnTeam: null,
        teams: { 1: { pokemon: [], activeIdx: 0, hand: [], lostLives: 0, wrongAnswers: [] }, 2: { pokemon: [], activeIdx: 0, hand: [], lostLives: 0, wrongAnswers: [] } }
    };

    window.uploadDataToFirestore = async function() {
        if (typeof POKEMON_DB === 'undefined') return window.showAlert("找不到 data.js，請確認檔案位置！");
        window.showConfirm("確定要將本地 data.js 的資料同步至 Firebase 雲端嗎？", async () => {
            try {
                window.addLog("⏳ 正在同步角色資料...");
                for (const p of POKEMON_DB) { 
                    if (p === null || typeof p !== 'object') continue;
                    if (p.id === undefined || p.id === null || p.id === "") throw new Error(`發現一隻寶可夢沒有設定 id！寶可夢名稱為：「${p.name || '未命名'}」`);
                    await setDoc(doc(db, "pokemons", p.id.toString()), p); 
                }
                for (const t of TRAINERS_DB) { 
                    if (t === null || typeof t !== 'object') continue;
                    if (t.id === undefined || t.id === null || t.id === "") throw new Error(`發現一個道具沒有設定 id！道具名稱為：「${t.name || '未命名'}」`);
                    await setDoc(doc(db, "trainers", t.id.toString()), t); 
                }
                window.showAlert("✅ 同步成功！角色與道具已上傳至雲端。"); window.addLog("✅ 雲端資料庫已更新。");
            } catch (e) { window.showAlert("❌ 同步失敗: " + e.message); }
        });
    };

    window.initGame = async function() {
        if (window.state.quizMode === 'manual' && window.state.questions.length === 0) {
            const input = document.getElementById('qInput').value.trim();
            if(!input) return window.showAlert("請輸入手動題目，或讀取 CSV 題庫！");
            window.state.questions = input.split('/').map(s => s.trim()).filter(s => s);
        }
        try {
            window.addLog("🌐 正在從雲端抓取角色資料...");
            const querySnapshot = await getDocs(collection(db, "pokemons"));
            let cloudPokemonDB = [];
            querySnapshot.forEach((doc) => { cloudPokemonDB.push(doc.data()); });

            const trainerSnapshot = await getDocs(collection(db, "trainers"));
            let cloudTrainerDB = [];
            trainerSnapshot.forEach((doc) => { cloudTrainerDB.push(doc.data()); });

            if (cloudPokemonDB.length === 0) return window.showAlert("雲端資料庫是空的！請先點擊同步。");

            window.CLOUD_POKEMON_DB = cloudPokemonDB;
            window.CLOUD_TRAINERS_DB = cloudTrainerDB;

            window.state.redrawsLeft = 2; let isBalanced = false; let attempts = 0;
            while (!isBalanced && attempts < 100) {
                for(let t=1; t<=2; t++) {
                    const pool = [...cloudPokemonDB].sort(() => Math.random() - 0.5);
                    window.state.teams[t].pokemon = pool.slice(0, 5).map((p, i) => ({
                        ...p, currHp: p.hp, attachedEnergy: [], uid: `t${t}_${i}`,
                        status: { poison: false, paralyze: false, burn: false, asleep: false, confused: false, immune_next: false, reduce_dmg_20: false, reduce_dmg_30: false, reduce_dmg_50: false, cant_attack: 0, enemy_dmg_minus_30: 0, pending_buff_dmg: 0 },
                        buff: { dmg: 0, turns: 0, hasFocusSash: false, potHelmet: 0, fullFaceGuard: 0 }, isDead: false, hasContributedToLoss: false
                    }));
                    window.state.teams[t].hand = []; window.state.teams[t].lostLives = 0; window.state.teams[t].wrongAnswers = [];
                }
                const hp1 = window.state.teams[1].pokemon.reduce((sum, p) => sum + p.hp, 0);
                const hp2 = window.state.teams[2].pokemon.reduce((sum, p) => sum + p.hp, 0);
                attempts++; if (Math.abs(hp1 - hp2) <= 80 || attempts >= 50) isBalanced = true; 
            }

            document.getElementById('lobby').classList.add('hidden');
            document.getElementById('battle-field').classList.remove('hidden');
            window.updateBattleScale(); 
            window.state.step = 'setup';
            window.addLog(`🎲 雲端連線成功！請決定先攻方。`);
            window.render();
        } catch (e) { window.showAlert("❌ 連線失敗：" + e.message); }
    };

    // 💡 新增：統一的補血動畫函數
    window.showHeal = function(uid, amount) {
        const target = document.getElementById(uid); if(!target) return;
        const rect = target.getBoundingClientRect();
        const cx = rect.left + rect.width / 2; const cy = rect.top + rect.height / 2;
        const pop = document.createElement('div'); pop.className = 'heal-pop'; pop.textContent = `+${amount}`;
        pop.style.left = `${cx - 35}px`; pop.style.top = `${cy - 35}px`;
        document.body.appendChild(pop); setTimeout(() => pop.remove(), 1000);
    };

    // =========================================================
    // 💡 大腦：招式效果字典
    // =========================================================
    window.AttackEffects = {
        'poison': (attacker, defender, log) => { defender.status.poison = true; log.text += ` ☠️ 對手中毒！`; },
        'poison_flip': (attacker, defender, log, coinResult) => { if (coinResult) { defender.status.poison = true; log.text += ` ☠️ 對手中毒！`; } },
        'burn': (attacker, defender, log) => { defender.status.burn = true; log.text += ` 🔥 對手灼傷！`; },
        'burn_flip': (attacker, defender, log, coinResult) => { if (coinResult) { defender.status.burn = true; log.text += ` 🔥 對手灼傷！`; } },
        'asleep': (attacker, defender, log) => { defender.status.asleep = true; log.text += ` 💤 對手睡眠！`; },
        'asleep_flip': (attacker, defender, log, coinResult) => { if (coinResult) { defender.status.asleep = true; log.text += ` 💤 對手睡眠！`; } },
        'asleep_self': (attacker, defender, log) => { attacker.status.asleep = true; log.text += ` 💤 副作用：自己陷入睡眠！`; },
        'confuse': (attacker, defender, log) => { defender.status.confused = true; log.text += ` 💫 對手混亂！`; },
        'confuse_flip': (attacker, defender, log, coinResult) => { if (coinResult) { defender.status.confused = true; log.text += ` 💫 對手混亂！`; } },
        'confuse_self_flip': (attacker, defender, log, coinResult) => { if (!coinResult) { attacker.status.confused = true; log.text += ` 💫 副作用：自己陷入混亂！`; } },
        'paralyze_flip': (attacker, defender, log, coinResult) => { if (coinResult) { defender.status.paralyze = true; log.text += ` ⚡ 對手麻痺！`; } },
        
        'heal_self_20': (attacker, defender, log) => { attacker.currHp = Math.min(attacker.hp, attacker.currHp + 20); window.showHeal(attacker.uid, 20); log.text += ` 💚 恢復了 20 HP！`; },
        'heal_self_30': (attacker, defender, log) => { attacker.currHp = Math.min(attacker.hp, attacker.currHp + 30); window.showHeal(attacker.uid, 30); log.text += ` 💚 恢復了 30 HP！`; },
        
        // 🌟 新增：全體恢復 30 生命
        'heal_all_allies_30': (attacker, defender, log) => { 
            const myTeam = window.state.teams[window.state.currentTeam];
            myTeam.pokemon.forEach(p => { 
                if (p.currHp > 0) {
                    let oldHp = p.currHp;
                    p.currHp = Math.min(p.hp, p.currHp + 30); 
                    if(p.currHp > oldHp) window.showHeal(p.uid, p.currHp - oldHp);
                }
            });
            log.text += ` 💚 聖光發動！我方全體恢復 HP！`; 
        },

        'red_hp_burst_40': (attacker, defender, log, coinResult, baseDmg) => { if ((attacker.currHp / attacker.hp) < 0.3) { log.text += ` (💥紅血爆發，傷害+40！)`; return baseDmg + 40; } return baseDmg; },
        'red_hp_burst_50': (attacker, defender, log, coinResult, baseDmg) => { if ((attacker.currHp / attacker.hp) < 0.3) { log.text += ` (💥紅血爆發，傷害+50！)`; return baseDmg + 50; } return baseDmg; },
        'red_hp_burst_60': (attacker, defender, log, coinResult, baseDmg) => { if ((attacker.currHp / attacker.hp) < 0.3) { log.text += ` (💥紅血爆發，傷害+60！)`; return baseDmg + 60; } return baseDmg; },
        'plus_dmg_if_status_30': (attacker, defender, log, coinResult, baseDmg) => { const hasS = attacker.status.poison || attacker.status.burn || attacker.status.asleep || attacker.status.confused || attacker.status.paralyze; if(hasS) { log.text += ` (潛能激發追加 30 傷害！)`; return baseDmg + 30; } return baseDmg; },
        'plus_dmg_if_status_40': (attacker, defender, log, coinResult, baseDmg) => { const hasS = attacker.status.poison || attacker.status.burn || attacker.status.asleep || attacker.status.confused || attacker.status.paralyze; if(hasS) { log.text += ` (潛能激發追加 40 傷害！)`; return baseDmg + 40; } return baseDmg; },
        
        // 🌟 新增：扣除招式所需後，額外能量每多一顆加 10 傷害
        'plus_dmg_per_extra_energy_10': (attacker, defender, log, coinResult, baseDmg, atk) => { 
            let extraCount = Math.max(0, attacker.attachedEnergy.length - atk.cost.length);
            let added = extraCount * 10;
            if (added > 0) log.text += ` (額外 ${extraCount} 能量追加 ${added} 傷害！)`; 
            return baseDmg + added; 
        },

        'self_dmg_20': (attacker, defender, log) => { attacker.currHp = Math.max(0, attacker.currHp - 20); window.showDamage(attacker.uid, 20, 'normal', false, attacker.uid); log.text += ` (副作用：自傷 20)`; },
        'self_dmg_30': (attacker, defender, log) => { attacker.currHp = Math.max(0, attacker.currHp - 30); window.showDamage(attacker.uid, 30, 'normal', false, attacker.uid); log.text += ` (副作用：自傷 30)`; },
        'cant_act_next': (attacker, defender, log) => { attacker.status.cant_attack = 2; log.text += ` (下回禁攻)`; },
        'cant_act_next_and_discard_1': (attacker, defender, log) => { attacker.status.cant_attack = 2; if(attacker.attachedEnergy.length > 0) attacker.attachedEnergy.pop(); log.text += ` (下回禁攻且棄 1 能)`; },
        'seal_both_discard': (attacker, defender, log) => { defender.status.cant_attack = 1; if(attacker.attachedEnergy.length > 0) attacker.attachedEnergy.pop(); if(defender.attachedEnergy.length > 0) defender.attachedEnergy.pop(); log.text += ` (雙方棄能，敵禁攻)`; },
        'immune_next_flip': (attacker, defender, log, coinResult) => { if(coinResult) { attacker.status.immune_next = true; log.text += ` (下回免傷)`; } },
        'reduce_dmg_taken_20': (attacker, defender, log) => { attacker.status.reduce_dmg_20 = true; log.text += ` (下回受傷-20)`; },
        'reduce_dmg_taken_30': (attacker, defender, log) => { attacker.status.reduce_dmg_30 = true; },
        'reduce_dmg_taken_50': (attacker, defender, log) => { attacker.status.reduce_dmg_50 = true; },
        'reduce_dmg_taken_flip': (attacker, defender, log, coinResult) => { if(coinResult) { attacker.status.reduce_dmg_30 = true; log.text += ` (受傷-30)`; } },
        'reduce_dmg_taken_flip_30': (attacker, defender, log, coinResult) => { if(coinResult) { attacker.status.reduce_dmg_30 = true; log.text += ` (受傷-30)`; } },
        'enemy_dmg_minus_30': (attacker, defender, log) => { defender.status.enemy_dmg_minus_30 = 2; },
        
        'calm_mind_20': (attacker, defender, log) => { 
            attacker.status.pending_buff_dmg = 20; // 存入暫存區
            attacker.status.reduce_dmg_20 = true;  // 本回合立即套用減傷盾
            log.text += ` (冥想發動：下回攻擊+20，且目前受傷-20)`;
        },

        'seal_attack': (attacker, defender, log) => { defender.status.cant_attack = 1; if(attacker.attachedEnergy.length > 0) attacker.attachedEnergy.pop(); },
        'discard_1_fire': (attacker, defender, log) => { let r=0; attacker.attachedEnergy = attacker.attachedEnergy.filter(e => { if((e==='fire'||e==='rainbow') && r<1) { r++; return false; } return true; }); },
        'discard_2_fire': (attacker, defender, log) => { let r=0; attacker.attachedEnergy = attacker.attachedEnergy.filter(e => { if((e==='fire'||e==='rainbow') && r<2) { r++; return false; } return true; }); },
        'discard_enemy_energy': (attacker, defender, log) => { if(defender.attachedEnergy.length > 0) defender.attachedEnergy.pop(); },
        'discard_enemy_energy_flip': (attacker, defender, log, coinResult) => { if(coinResult && defender.attachedEnergy.length > 0) defender.attachedEnergy.pop(); },
        'discard_1_elec_and_paralyze': (attacker, defender, log) => { let r=false; attacker.attachedEnergy = attacker.attachedEnergy.filter(e => { if((e==='electric'||e==='rainbow') && !r) { r=true; return false; } return true; }); defender.status.paralyze = true; log.text += ` ⚡ 麻痺！`; },
        'ignore_resistance': (attacker, defender, log, coinResult, baseDmg) => { log.text += ` (無視對手防禦)`; return baseDmg; },
        'damage_flip_20': (attacker, defender, log, coinResult, baseDmg) => { if(coinResult) { log.text += ' (+20傷害！)'; return baseDmg + 20; } return baseDmg; },
        'damage_flip_25': (attacker, defender, log, coinResult, baseDmg) => { if(coinResult) { log.text += ' (+25傷害！)'; return baseDmg + 25; } return baseDmg; },
        'damage_flip_30': (attacker, defender, log, coinResult, baseDmg) => { if(coinResult) { log.text += ' (+30傷害！)'; return baseDmg + 30; } return baseDmg; },

        // 🌟 新增：全體範圍攻擊 (AoE)
        'aoe_20': (attacker, defender, log) => {
            const enemyTeam = window.state.teams[window.state.currentTeam === 1 ? 2 : 1];
            let hits = 0;
            enemyTeam.pokemon.forEach((p, idx) => {
                if (idx !== enemyTeam.activeIdx && p.currHp > 0) {
                    p.currHp = Math.max(0, p.currHp - 20);
                    window.showDamage(p.uid, 20, attacker.type, false);
                    hits++;
                    if (p.currHp <= 0 && !p.isDead) { p.isDead = true; enemyTeam.lostLives++; log.text += ` 💀 後備 ${p.name} 氣絕！`; }
                }
            });
            if(hits > 0) log.text += ` (龍捲風：波及對手全體後備造成 20 傷害！)`;
        }
    };

    window.updateBattleScale = function() {
        const winW = window.innerWidth; const winH = window.innerHeight;
        const wrapper = document.getElementById('battle-scale-wrapper');
        if (wrapper) { const scale = Math.min(winW / 1280, winH / 720); wrapper.style.transform = `translate(-50%, -50%) scale(${scale})`; }
        const lobbyBox = document.querySelector('.config-box');
        if (lobbyBox && !document.getElementById('lobby').classList.contains('hidden')) { const lobbyScale = Math.min(1, Math.min(winW / 900, winH / 750)); lobbyBox.style.transform = `scale(${lobbyScale})`; }
    };
    window.addEventListener('resize', window.updateBattleScale);

    window.showAlert = function(msg) { document.getElementById('sys-alert-msg').innerText = msg; document.getElementById('sys-alert').style.display = 'flex'; };
    window.showConfirm = function(msg, onYes) { document.getElementById('sys-confirm-msg').innerText = msg; document.getElementById('sys-confirm-yes').onclick = () => { document.getElementById('sys-confirm').style.display = 'none'; onYes(); }; document.getElementById('sys-confirm').style.display = 'flex'; };
    window.showHandTooltip = function(team, text) { const el = document.getElementById('hand-tooltip-' + team); if (el && text) { el.innerText = text; el.classList.add('show'); } };
    window.hideHandTooltip = function(team) { const el = document.getElementById('hand-tooltip-' + team); if (el) el.classList.remove('show'); };
    window.getTypeName = function(eng) { const map = { fire: '火', water: '水', grass: '草', electric: '電', normal: '普', brown: '棕', purple: '紫', any: '任', rainbow: '彩虹' }; return map[eng] || eng; };
    window.updateHint = function(txt) { document.getElementById('action-hint').innerText = txt; };
    window.addLog = function(msg) {
        const l = document.getElementById('log'); const entry = document.createElement('div'); entry.className = 'log-entry'; entry.textContent = `[系統] ${msg}`;
        l.insertBefore(entry, l.firstChild); Array.from(l.children).forEach(child => child.style.opacity = '1');
        if (l.children.length > 8) { l.removeChild(l.lastChild); }
    };

    window.getSmartEnergyType = function(team) {
        let pool = new Set();
        team.pokemon.filter(p => p.currHp > 0).forEach(p => { pool.add(p.type); p.attacks.forEach(atk => { atk.cost.forEach(c => { if (c !== 'any') pool.add(c); }); }); });
        let poolArr = Array.from(pool); if (poolArr.length === 0) poolArr = ['normal'];
        let chosen = poolArr[Math.floor(Math.random() * poolArr.length)];
        if (Math.random() < 0.15) chosen = 'rainbow'; return chosen;
    };

    const fxCanvas = document.getElementById('fx-canvas'); const fxCtx = fxCanvas.getContext('2d');
    let fxParticles = [], fxSparks = [], fxProjectiles = [], fxSpecial = []; let screenShake = 0, hitStop = 0, fxFrame = 0;
    window.resizeFxCanvas = function() { fxCanvas.width = window.innerWidth; fxCanvas.height = window.innerHeight; };
    window.addEventListener('resize', window.resizeFxCanvas); window.resizeFxCanvas();
    
    window.triggerModernHit = function(x, y, type, dmg) {
        const colors = { fire: '#FF4400', water: '#0088FF', grass: '#00FF44', electric: '#FFDD00', normal: '#FFFFFF', brown: '#a0522d', purple: '#9b59b6' };
        const color = colors[type] || '#FFFFFF';
        fxSparks.push({ x, y, color, l: 1.0, scale: 0.2, maxScale: 0.8 + dmg/150 });
        for(let i=0; i<30; i++) fxParticles.push({ x, y, c: color, vx: (Math.random()-0.5)*12, vy: (Math.random()-0.5)*12, l: 1.0, d: 0.02, s: 6 + Math.random()*6 });
        screenShake = Math.min(40, 15 + dmg/8); hitStop = 8;
    };

    window.triggerUltimateHit = function(tx, ty, type, dmg, sx, sy) {
        const colors = { fire: '#FF4400', water: '#0088FF', grass: '#00FF44', electric: '#FFDD00', normal: '#FFFFFF', brown: '#a0522d', purple: '#9b59b6' };
        const color = colors[type] || '#FFFFFF';
        if (type === 'electric') {
            fxSpecial.push({ type: 'thunder', x: tx, y: ty, l: 1.0 });
            setTimeout(() => { window.triggerModernHit(tx, ty, type, dmg * 1.5); screenShake = 50; hitStop = 10; }, 150);
        } else {
            let count = 0;
            let burst = setInterval(() => {
                fxProjectiles.push({ x: sx + (Math.random()-0.5)*100, y: sy + (Math.random()-0.5)*100, tx: tx + (Math.random()-0.5)*60, ty: ty + (Math.random()-0.5)*60, c: color, type: type, speed: 0.15, progress: 0 });
                count++; if (count >= 10) { clearInterval(burst); setTimeout(() => { window.triggerModernHit(tx, ty, type, dmg); screenShake = 45; hitStop = 10; }, 150); }
            }, 60);

    window.animateFx = function() {
        fxFrame++; if(hitStop > 0) { hitStop--; requestAnimationFrame(window.animateFx); return; }
        if(screenShake > 0) { document.body.style.transform = `translate(${(Math.random()-0.5)*screenShake}px, ${(Math.random()-0.5)*screenShake}px)`; screenShake *= 0.85; if(screenShake < 0.5) { screenShake = 0; document.body.style.transform = ''; } }
        fxCtx.clearRect(0, 0, fxCanvas.width, fxCanvas.height); fxCtx.globalCompositeOperation = 'lighter';
        fxSpecial = fxSpecial.filter(s => s.l > 0); fxSpecial.forEach(s => {
            if (s.type === 'thunder') {
                fxCtx.save(); fxCtx.strokeStyle = '#FFF'; fxCtx.shadowBlur = 50; fxCtx.shadowColor = '#FFDD00'; fxCtx.lineWidth = 30 * s.l;
                fxCtx.beginPath(); let x = s.x + (Math.random()-0.5)*200, y = 0; fxCtx.moveTo(x, y);
                while(y < s.y) { x += (Math.random()-0.5)*80; y += 50; fxCtx.lineTo(x, y); } fxCtx.stroke();
                fxCtx.restore(); s.l -= 0.15;
            }
        });
        fxProjectiles = fxProjectiles.filter(p => p.progress < 1); fxProjectiles.forEach(p => {
            p.progress += p.speed; if (p.progress > 1) p.progress = 1;
            const curX = p.x + (p.tx - p.x) * p.progress; const curY = p.y + (p.ty - p.y) * p.progress;
            fxCtx.save(); fxCtx.fillStyle = p.c; fxCtx.translate(curX, curY); fxCtx.beginPath(); fxCtx.arc(0, 0, 15, 0, Math.PI*2); fxCtx.fill(); fxCtx.restore();
            if (p.progress === 1) { fxSparks.push({ x: p.tx, y: p.ty, color: p.c, l: 1.0, scale: 0.1, maxScale: 0.35 }); }
        });
        fxSparks = fxSparks.filter(s => s.l > 0); fxSparks.forEach(s => { window.drawSparkV2(s); s.scale += (s.maxScale - s.scale) * 0.2; s.l -= 0.04; });
        fxParticles = fxParticles.filter(p => p.l > 0); fxParticles.forEach(p => {
            fxCtx.save(); fxCtx.globalAlpha = p.l; fxCtx.fillStyle = p.c; fxCtx.beginPath(); fxCtx.arc(p.x, p.y, p.s, 0, Math.PI*2); fxCtx.fill(); fxCtx.restore();
            p.x += p.vx; p.y += p.vy; p.l -= p.d;
        });
        requestAnimationFrame(window.animateFx);
    };
    
    window.drawSparkV2 = function(s) {
        fxCtx.save(); fxCtx.translate(s.x, s.y); fxCtx.globalAlpha = s.l; fxCtx.globalCompositeOperation = 'lighter';
        const coreGrad = fxCtx.createRadialGradient(0, 0, 0, 0, 0, 50 * s.scale); 
        coreGrad.addColorStop(0, '#fff'); coreGrad.addColorStop(0.4, s.color); coreGrad.addColorStop(1, 'transparent');
        fxCtx.fillStyle = coreGrad; fxCtx.beginPath(); fxCtx.arc(0, 0, 60 * s.scale, 0, Math.PI*2); fxCtx.fill(); 
        fxCtx.strokeStyle = s.color; fxCtx.lineWidth = 5 * s.l; fxCtx.beginPath(); fxCtx.arc(0, 0, 150 * s.scale, 0, Math.PI * 2); fxCtx.stroke();
        fxCtx.fillStyle = '#fff';
        for(let i=0; i<16; i++) {
            fxCtx.save(); fxCtx.rotate((i / 16) * Math.PI * 2 + fxFrame * 0.05);
            const len = (i % 2 === 0 ? 200 : 100) * s.scale; const w = 3 * s.scale;
            fxCtx.beginPath(); fxCtx.moveTo(0, -w); fxCtx.lineTo(len, 0); fxCtx.lineTo(0, w); fxCtx.fill();
            fxCtx.restore();
        }
        fxCtx.restore();
    };
    window.animateFx();

    window.showDamage = function(uid, dmg, type = 'normal', isUltimate = false, attackerUid = null) {

    window.parseCSVData = function(text) {
        const lines = text.split(/\r\n|\n|\r/); window.state.csvQuestions = [];
        let startIndex = lines[0] && (lines[0].includes('題') || lines[0].includes('答')) ? 1 : 0;
        for(let i = startIndex; i < lines.length; i++) {
            let line = lines[i].trim(); if(!line) continue;
            let cols = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.trim().replace(/^"(.*)"$/, '$1'));
            if(cols.length >= 4) {
                let ans = parseInt(cols[cols.length - 1]); let opts = cols.slice(2, cols.length - 1).filter(o => o !== "");
                if(!isNaN(ans) && ans >= 1 && ans <= opts.length) { window.state.csvQuestions.push({ id: cols[0], q: cols[1], opts: opts, ans: ans }); }
            }
        }
        if(window.state.csvQuestions.length > 0) window.state.quizMode = 'csv';
    };

    window.fetchCloudCSV = function() {
        let url = document.getElementById('cloud-url').value.trim(); if(!url) return;
        document.getElementById('cloud-status').innerText = "⏳ 解析連結中...";
        const idMatch = url.match(/\/d\/([a-zA-Z0-9-_]+)/);
        if (!idMatch || !idMatch[1]) { document.getElementById('cloud-status').innerText = "❌ 無法解析網址，請確認包含 /d/ 試算表ID"; return; }
        
        const sheetId = idMatch[1]; const callbackName = 'gvizCallback_' + Date.now();
        window[callbackName] = function(data) {
            try {
                window.state.csvQuestions = []; let rows = data.table.rows; let startIdx = 0;
                if(rows.length > 0 && rows[0].c[0] && rows[0].c[0].v && typeof rows[0].c[0].v === 'string') {
                    const firstCell = rows[0].c[0].v.toLowerCase();
                    if(firstCell.includes('題') || firstCell.includes('question') || firstCell.includes('答') || firstCell.includes('id')) { startIdx = 1; }
                }
                for(let i = startIdx; i < rows.length; i++) {
                    let row = rows[i]; if(!row.c || !row.c[0] || row.c[0].v === null || row.c[0].v === undefined) continue;
                    let cols = row.c.map(cell => (cell && cell.v !== null && cell.v !== undefined) ? cell.v.toString().trim() : "");
                    while(cols.length > 0 && cols[cols.length - 1] === "") { cols.pop(); }
                    if(cols.length >= 4) {
                        let qId = cols[0], qText = cols[1], ans = parseInt(cols[cols.length - 1]);
                        let opts = cols.slice(2, cols.length - 1).filter(o => o !== "");
                        if(!isNaN(ans) && ans > 0 && ans <= opts.length) { window.state.csvQuestions.push({ id: qId, q: qText, opts: opts, ans: ans }); }
                    }
                }
                if (window.state.csvQuestions.length > 0) {
                    window.state.quizMode = 'csv'; document.getElementById('cloud-status').innerText = `✅ 連線成功！讀取到 ${window.state.csvQuestions.length} 題。`;
                } else throw new Error("No valid data");
            } catch (e) { document.getElementById('cloud-status').innerText = "❌ 解析失敗。請確認格式（第1欄:題號, 第2欄:題目, 中間:選項, 最後1欄:解答數字）。"; }
            delete window[callbackName]; document.getElementById(callbackName).remove();
        };
        const script = document.createElement('script'); script.id = callbackName;
        script.src = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=responseHandler:${callbackName}`;
        script.onerror = function() { document.getElementById('cloud-status').innerText = "❌ 連線失敗。請確認試算表「共用」設定。"; delete window[callbackName]; script.remove(); };
        document.body.appendChild(script);
    };

    window.loadLocalCSV = function(e) {
        const file = e.target.files[0]; if(!file) return;
        const reader = new FileReader();
        reader.onload = (evt) => { 
            window.parseCSVData(evt.target.result); 
            if (window.state.csvQuestions.length > 0) alert(`✅ 讀取到 ${window.state.csvQuestions.length} 題。`); else alert("❌ 無法解析題庫格式。"); 
        };
        reader.readAsText(file);
    };

    window.redrawCards = function() {
        if(window.state.redrawsLeft > 0) {
            window.state.redrawsLeft--; let isBalanced = false; let attempts = 0;
            const pDB = window.CLOUD_POKEMON_DB || (typeof POKEMON_DB !== 'undefined' ? POKEMON_DB : []);
            while (!isBalanced && attempts < 100) {
                for(let t=1; t<=2; t++) {
                    const pool = [...pDB].sort(() => Math.random() - 0.5);
                    window.state.teams[t].pokemon = pool.slice(0, 5).map((p, i) => ({
                        ...p, currHp: p.hp, attachedEnergy: [], uid: `t${t}_${i}`,
                        status: { poison: false, paralyze: false, burn: false, asleep: false, confused: false, immune_next: false, reduce_dmg_20: false, reduce_dmg_30: false, reduce_dmg_50: false, cant_attack: 0, enemy_dmg_minus_30: 0, pending_buff_dmg: 0 },
                        buff: { dmg: 0, turns: 0, hasFocusSash: false, potHelmet: 0, fullFaceGuard: 0 }, isDead: false, hasContributedToLoss: false
                    }));
                    window.state.teams[t].hand = []; window.state.teams[t].lostLives = 0; window.state.teams[t].wrongAnswers = [];
                }
                const hp1 = window.state.teams[1].pokemon.reduce((sum, p) => sum + p.hp, 0); const hp2 = window.state.teams[2].pokemon.reduce((sum, p) => sum + p.hp, 0);
                attempts++; if (Math.abs(hp1 - hp2) <= 80 || attempts >= 50) isBalanced = true; 
            }
            window.addLog(`🔄 已重新發放雙方卡牌。剩餘調度次數：${window.state.redrawsLeft}`); window.render();
        }
    };

    window.startGame = function(firstTeam) { window.state.currentTeam = firstTeam; document.getElementById('setup-ui').style.display = 'none'; window.startQuiz(); };

    window.startQuiz = function() {
        const myTeam = window.state.teams[window.state.currentTeam]; const activeP = myTeam.pokemon[myTeam.activeIdx];
        const aliveBench = myTeam.pokemon.filter((p, idx) => idx !== myTeam.activeIdx && p.currHp > 0);

        if(activeP.currHp <= 0) {
            if(aliveBench.length === 0) { if(!window.checkGameOver()) { window.showVictory(window.state.currentTeam === 1 ? 2 : 1); } return; }
            window.state.step = 'must_swap'; window.updateHint("⚠️ 戰鬥寶可夢已氣絕！請點擊後備區寶可夢上場。"); window.render(); return;
        }

        activeP.status.immune_next = false; activeP.status.reduce_dmg_20 = false; activeP.status.reduce_dmg_30 = false; activeP.status.reduce_dmg_50 = false;
        if(activeP.status.cant_attack > 0) { window.addLog(`🚫 ${activeP.name} 受副作用影響，本回合無法攻擊！`); }

        window.state.step = 'quiz'; window.state.selectedHandItem = null; window.state.isAttacking = false;
        
        document.getElementById('modal-team-name').textContent = `TEAM ${window.state.currentTeam} 答題時間`;
        document.getElementById('modal-team-name').style.color = '#ffcb05';
        
        const qContainer = document.getElementById('quiz-options-container'); qContainer.innerHTML = '';

        if (window.state.quizMode === 'csv' && window.state.csvQuestions.length > 0) {
            const qObj = window.state.csvQuestions[window.state.qIdx % window.state.csvQuestions.length];
            let qFontSize = qObj.q.length > 30 ? '36px' : '50px';
            document.getElementById('quiz-text').innerHTML = `<div style="font-size:${qFontSize}; font-weight:bold; color:#fff; text-shadow: 2px 2px 4px #000; margin-bottom:30px; padding: 0 20px;">${qObj.q}</div>`;
            
            const styles = ['kb-red', 'kb-blue', 'kb-yellow', 'kb-green']; const icons = ['▲', '◆', '●', '■'];
            qObj.opts.forEach((opt, i) => {
                const isCorrect = (i + 1 === qObj.ans);
                let fontSize = opt.length > 40 ? '20px' : (opt.length > 15 ? '26px' : '32px');
                qContainer.innerHTML += `<button class="kahoot-btn ${styles[i % 4]}" onclick="window.checkAnswer(${isCorrect})"><span style="margin-right:15px; font-size:36px; flex-shrink:0;">${icons[i % 4]}</span><span style="flex:1; text-align:left; font-size:${fontSize}; line-height:1.3; display:-webkit-box; -webkit-line-clamp:4; -webkit-box-orient:vertical; overflow:hidden; text-overflow:ellipsis;">${opt}</span></button>`;
            });
        } else {

            let qFontSize = qText.length > 30 ? '40px' : '60px';

            qContainer.innerHTML = `<button class="btn" style="background:#4caf50; color:white; padding:25px 60px; width:auto; font-size:40px; margin:0 20px; border-radius:16px;" onclick="window.checkAnswer(true)">◯ 答對</button><button class="btn" style="background:#f44336; color:white; padding:25px 60px; width:auto; font-size:40px; margin:0 20px; border-radius:16px;" onclick="window.checkAnswer(false)">✕ 答錯</button>`;
        }

        document.getElementById('quiz-modal').style.display = 'flex'; window.updateHint("答對題目即可獲得資源並進行行動！"); window.render();
    };

    window.checkAnswer = function(correct) {
        const currentQIdx = window.state.qIdx; document.getElementById('quiz-modal').style.display = 'none'; window.state.qIdx++;

        if(correct) {
            window.state.step = 'action'; window.state.hasAttachedEnergyThisTurn = false; window.state.isAttacking = false;
            const myTeam = window.state.teams[window.state.currentTeam]; const givenEnergy = window.getSmartEnergyType(myTeam);

            const tDB = window.CLOUD_TRAINERS_DB || (typeof TRAINERS_DB !== 'undefined' ? TRAINERS_DB : []);
            if(Math.random() < 0.4 && myTeam.hand.length < 7 && tDB.length > 0) { const trainer = tDB[Math.floor(Math.random() * tDB.length)]; myTeam.hand.push({ cardType: 'trainer', ...trainer }); window.addLog(`🎁 獲得道具：「${trainer.name}」！`); }

    window.selectHandCard = function(idx) {

    window.retreatToBench = function(team, newIdx) {

    window.clickPokemon = function(teamNum, pIdx) {
        if(window.state.isAttacking) return;
        const team = window.state.teams[teamNum]; const p = team.pokemon[pIdx];

        if (p.currHp <= 0) { let isReviving = window.state.selectedHandItem && window.state.selectedHandItem.data.target === 'dead_ally' && teamNum === window.state.currentTeam; if (!isReviving) return; }

            team.pokemon[team.activeIdx].status = { poison: false, paralyze: false, burn: false, asleep: false, confused: false, immune_next: false, reduce_dmg_20: false, reduce_dmg_30: false, reduce_dmg_50: false, cant_attack: 0, enemy_dmg_minus_30: 0, pending_buff_dmg: 0 };

                let dmg = window.state.pendingAttack.atk.d;
                p.currHp = Math.max(0, p.currHp - dmg);

                setTimeout(window.processEndOfTurn, 1500);
            } else { window.showAlert("請選擇對手的寶可夢！"); }

        if (window.state.step === 'select_ally_heal_50') {

                let healAmount = 50;
                p.currHp = Math.min(p.hp, p.currHp + healAmount);
                window.showHeal(p.uid, healAmount);
                window.addLog(`💚 恢復了 ${p.name} ${healAmount} 點生命值！`);
                window.state.step = 'finished'; window.state.pendingAttack = null; window.render();
                setTimeout(window.processEndOfTurn, 1500);
            } else { window.showAlert("請選擇我方沒死的寶可夢！"); }
            return;
        }

        if (window.state.step === 'select_enemy_bench') {
            if (teamNum !== window.state.currentTeam && pIdx !== window.state.teams[teamNum].activeIdx && p.currHp > 0) { window.retreatToBench(window.state.teams[teamNum], pIdx); window.addLog(`💨 強制將 ${p.name} 拖入戰場！`); window.state.step = 'finished'; window.render(); setTimeout(window.processEndOfTurn, 1500); }

                defender.currHp = Math.max(0, defender.currHp - dmg);
                window.showDamage(defender.uid, dmg, attacker.type, isUltimate, attacker.uid);
                log.text += `造成 ${dmg} 傷害！`;
            } else if (atk.d > 0) { window.showDamage(defender.uid, 0, attacker.type, false, attacker.uid); }

            if (defender.currHp <= 0 && !defender.isDead) { defender.isDead = true; window.state.teams[enemyTeamNum].lostLives++; log.text += ` 💀 敵方氣絕！`; }
            if (attacker.currHp <= 0 && !attacker.isDead) { attacker.isDead = true; window.state.teams[window.state.currentTeam].lostLives++; log.text += ` 💀 我方氣絕！`; }

            window.addLog(log.text); window.state.step = 'finished'; window.state.selectedHandItem = null; window.render(); 
            document.getElementById('end-turn-btn').style.display = 'block';
            if (window.checkGameOver()) return;
            setTimeout(() => { window.state.isAttacking = false; window.processEndOfTurn(); }, isUltimate ? 2500 : 1500);
        } catch (e) { window.state.isAttacking = false; window.showAlert("攻擊錯誤: " + e.message); console.error(e); }
    };

    window.endTurn = function() { if(window.state.step === 'action' && !window.state.isAttacking) window.processEndOfTurn(); };

    window.processEndOfTurn = function() {
        let someoneDied = false; window.state.eotFlips = [];
        [1, 2].forEach(t => {
            const activeP = window.state.teams[t].pokemon[window.state.teams[t].activeIdx];
            if (activeP && activeP.currHp > 0) {
                if (activeP.status.poison) { activeP.currHp = Math.max(0, activeP.currHp - 10); window.showDamage(activeP.uid, 10, 'poison'); window.addLog(`☠️ ${activeP.name} 中毒受傷。`); }
                if (activeP.status.burn) { activeP.currHp = Math.max(0, activeP.currHp - 20); window.showDamage(activeP.uid, 20, 'fire'); window.addLog(`🔥 ${activeP.name} 灼傷受傷。`); window.state.eotFlips.push({team: t, pIdx: window.state.teams[t].activeIdx, type: 'burn'}); }
                if (activeP.status.asleep) { window.state.eotFlips.push({team: t, pIdx: window.state.teams[t].activeIdx, type: 'asleep'}); }
                if (activeP.currHp <= 0 && !activeP.isDead) { activeP.isDead = true; window.state.teams[t].lostLives++; someoneDied = true; window.addLog(`💀 ${activeP.name} 氣絕！`); }
            }
            
            window.state.teams[t].pokemon.forEach(p => {
                if(p.currHp > 0 && t === window.state.currentTeam) {
                    if(p.buff.turns > 0) { p.buff.turns--; if(p.buff.turns === 0) p.buff.dmg = 0; }
                    if(p.buff.fullFaceGuard > 0) { p.buff.fullFaceGuard--; if(p.buff.fullFaceGuard === 0) window.addLog(`🛡️ ${p.name} 防守失效。`); }
                    if(p.buff.potHelmet > 0) { p.buff.potHelmet--; if(p.buff.potHelmet === 0) window.addLog(`🪖 ${p.name} 頭盔失效。`); }
                }
            });

            if (activeP && activeP.currHp > 0 && activeP.status.pending_buff_dmg > 0 && t === window.state.currentTeam) {
                activeP.buff.dmg = activeP.status.pending_buff_dmg;
                activeP.buff.turns = 2;
                activeP.status.pending_buff_dmg = 0;
            }

            if(activeP && activeP.status.cant_attack > 0 && t === window.state.currentTeam) { activeP.status.cant_attack--; }
            if(activeP && activeP.status.enemy_dmg_minus_30 > 0 && t === window.state.currentTeam) { activeP.status.enemy_dmg_minus_30--; }
        });

        const endingTeamActive = window.state.teams[window.state.currentTeam].pokemon[window.state.teams[window.state.currentTeam].activeIdx];
        if (endingTeamActive && endingTeamActive.status.paralyze) { endingTeamActive.status.paralyze = false; window.addLog(`⚡ ${endingTeamActive.name} 麻痺解除。`); }
        
        if (someoneDied && window.checkGameOver()) return;
        setTimeout(window.processNextEotFlip, 1000);
    };

    window.processNextEotFlip = function() {
        if (window.state.eotFlips.length > 0) {
            const flip = window.state.eotFlips[0]; const p = window.state.teams[flip.team].pokemon[flip.pIdx];
            if (p.currHp <= 0) { window.state.eotFlips.shift(); window.processNextEotFlip(); return; }
            window.state.coinFlipReason = flip.type;
            document.getElementById('coin-desc').innerHTML = flip.type === 'burn' ? `請為 <b>${p.name}</b> 的🔥灼傷恢復擲硬幣：` : `請為 <b>${p.name}</b> 的💤睡眠恢復擲硬幣：`;
            const coinInner = document.getElementById('coin-inner'); if(coinInner) { coinInner.style.transition = 'none'; coinInner.style.transform = 'rotateY(0deg)'; }
            document.getElementById('coin-modal').style.display = 'flex';
        } else { window.state.nextTurnTeam = window.state.currentTeam === 1 ? 2 : 1; window.checkEotSwaps(); }
    };

    window.checkEotSwaps = function() {
        let p1 = window.state.teams[1].pokemon[window.state.teams[1].activeIdx]; let p2 = window.state.teams[2].pokemon[window.state.teams[2].activeIdx];
        if (p1.currHp <= 0 && window.state.teams[1].lostLives < 3) { window.state.currentTeam = 1; window.state.step = 'must_swap'; window.updateHint("⚠️ TEAM 1 必須替換！"); window.render(); return; }
        if (p2.currHp <= 0 && window.state.teams[2].lostLives < 3) { window.state.currentTeam = 2; window.state.step = 'must_swap'; window.updateHint("⚠️ TEAM 2 必須替換！"); window.render(); return; }
        window.state.currentTeam = window.state.nextTurnTeam; window.state.nextTurnTeam = null; window.render(); setTimeout(window.startQuiz, 1000);
    };

    window.checkGameOver = function() {
        let t1Dead = window.state.teams[1].lostLives >= 3; let t2Dead = window.state.teams[2].lostLives >= 3;
        if (t1Dead && t2Dead) { window.showVictory(0); return true; } if (t1Dead) { window.showVictory(2); return true; } if (t2Dead) { window.showVictory(1); return true; }
        return false;
    };

    window.showVictory = function(winningTeamNum) {
        document.getElementById('victory-team-text').textContent = winningTeamNum === 0 ? `🤝 雙方同時陣亡，平手！ 🤝` : `🏆 TEAM ${winningTeamNum} 獲勝！ 🏆`;
        const summaryDiv = document.getElementById('wrong-answers-summary'); let summaryHtml = "";
        [1, 2].forEach(t => {
            const wrongs = window.state.teams[t].wrongAnswers;
            summaryHtml += `<h3 style="color:${t===1?'#00c3ff':'#ff6b6b'}; margin-top:${t===2?'15px':'0'}; margin-bottom:5px; font-size:18px;">Team ${t} 錯題：</h3>`;
            if(wrongs.length === 0) { summaryHtml += `<div style="font-size:16px; color:#aaa; margin-left:10px;">(無錯題紀錄！)</div>`; } 
            else {
                const wrongCounts = {}; wrongs.forEach(w => { wrongCounts[w] = (wrongCounts[w] || 0) + 1; });
                const formattedWrongs = Object.entries(wrongCounts).map(([w, count]) => count > 1 ? `<span style="color:#4caf50; font-weight:bold;">${w}(${count})</span>` : `<span style="font-weight:bold;">${w}</span>`);
                summaryHtml += `<div style="font-size:18px; margin-left:10px; color:#eee; line-height: 1.6; word-wrap: break-word; letter-spacing:1px;">${formattedWrongs.join('<span style="color:#888; margin:0 6px;">,</span>')}</div>`;
            }
        });
        summaryDiv.innerHTML = summaryHtml; summaryDiv.style.display = 'block'; document.getElementById('victory-modal').style.display = 'flex';
    };

    window.inspectCard = function(t, pIdx) {
        const p = window.state.teams[t].pokemon[pIdx]; 
        const weakIcon = p.weakness === 'none' ? '無' : (Array.isArray(p.weakness) ? p.weakness.map(w => `<div class="energy-icon energy-${w}"></div>`).join('') : `<div class="energy-icon energy-${p.weakness}"></div>`);
        const resIcon = p.resistance.type === 'none' ? '無' : `<div class="energy-icon energy-${p.resistance.type}"></div>${p.resistance.val > 0 ? `-${p.resistance.val}` : ''}`;
        
        let statusHtml = ''; if (p.status.poison) statusHtml += '<span class="status-tag status-poison">中毒</span>'; if (p.status.burn) statusHtml += '<span class="status-tag status-burn">灼傷</span>'; if (p.status.asleep) statusHtml += '<span class="status-tag status-asleep">睡眠</span>'; if (p.status.confused) statusHtml += '<span class="status-tag status-confused">混亂</span>'; if (p.status.paralyze) statusHtml += '<span class="status-tag status-paralyze">麻痺</span>'; if (p.status.immune_next) statusHtml += '<span class="status-tag status-immune">免傷</span>'; if (p.status.cant_attack > 0) statusHtml += '<span class="status-tag status-cant-act">禁攻</span>';
        
        let buffHtml = ''; if (p.buff.turns > 0) buffHtml += `<div class="item-tag">💪攻擊+${p.buff.dmg}</div>`; if (p.buff.hasFocusSash) buffHtml += `<div class="item-tag">🎗️氣勢披帶</div>`; if (p.buff.fullFaceGuard > 0) buffHtml += `<div class="item-tag">🛡️傷害-20</div>`; if (p.buff.potHelmet > 0) buffHtml += `<div class="item-tag">🪖傷害-40</div>`;
        
        let attacksHtml = '';
        const isMyActive = (t === window.state.currentTeam && pIdx === window.state.teams[t].activeIdx && window.state.step === 'action');

        p.attacks.forEach((atk, aIdx) => {
            let costHtml = `<div style="display:flex; flex-wrap:wrap; width:45px; gap:4px; flex-shrink:0;">${atk.cost.map(c => `<div class="energy-icon energy-${c}"></div>`).join('')}</div>`; 
            if (isMyActive) {
                const hasEnergy = window.canUseAttack(p, atk);
                const rowClass = hasEnergy ? 'attack-ready' : 'attack-disabled';
                attacksHtml += `<div class="attack-row ${rowClass}" style="padding:15px; font-size:18px; margin-top:10px; border: 2px solid #aaa; flex-direction:column; align-items:stretch;" onclick="event.stopPropagation(); if(${hasEnergy}) { window.executeAttackFromInspect(${t}, ${aIdx}); } else { window.showAlert('能量不足！'); }">
                    <div style="display:flex; width:100%; justify-content:space-between; align-items:center; gap:10px;">${costHtml}<span style="flex:1; text-align:left; font-weight:bold; color: inherit; font-size:20px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${atk.n}${atk.desc ? ' ✨' : ''}</span><span style="font-size:26px; font-weight:bold; color: inherit; flex-shrink:0;">${atk.d}</span></div>
                    ${atk.desc ? `<div style="font-size:14px; color:inherit; margin-top:8px; text-align:left; opacity: 0.8; border-top:1px dashed rgba(0,0,0,0.2); padding-top:8px; word-break:break-all;">💡 ${atk.desc}</div>` : ''}
                </div>`;
            } else {
                attacksHtml += `<div class="attack-row" style="flex-direction:column; align-items:stretch; padding:10px;"><div style="display:flex; width:100%; justify-content:space-between; align-items:center; gap:8px;">${costHtml}<span style="flex:1; text-align:left; font-weight:bold; font-size:16px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${atk.n}</span><span style="font-size:18px; font-weight:bold; flex-shrink:0;">${atk.d}</span></div>${atk.desc ? `<div style="font-size:12px; color:#444; margin-top:6px; text-align:left; border-top:1px dashed rgba(0,0,0,0.2); padding-top:6px; word-break:break-all;">💡 ${atk.desc}</div>` : ''}</div>`;
            }
        });

        const cardHtml = `
            <div class="card type-${p.type}" style="cursor: default;">
                <div class="card-header"><div><div style="margin-bottom:5px;">${statusHtml}</div><span style="font-size:18px;">${p.name}</span></div><div style="text-align:right;"><span style="color: ${p.currHp < p.hp*0.3 ? '#ff0000' : '#000'}; font-weight:900;">HP ${p.currHp}/${p.hp}</span></div></div>
                <div class="hp-bar" style="height:12px;"><div class="hp-fill" style="width:${(p.currHp/p.hp)*100}%; background:${(p.currHp/p.hp)*100 < 30 ? '#ff4422' : '#4caf50'}"></div></div>
                <div class="card-img"><img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${p.id}.png" onerror="this.src='https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/0.png'"><div class="buff-container">${buffHtml}</div></div>
                <div class="energy-container" style="padding: 5px;">已附著: ${p.attachedEnergy.length === 0 ? '無' : p.attachedEnergy.map(e => `<div class="energy-icon energy-${e}"></div>`).join('')}</div>
                <div style="margin-top:15px; flex:1;">${attacksHtml}</div>
                <div style="font-size:12px; opacity:0.8; margin-top:15px; display:flex; justify-content:space-between; align-items:center; border-top:1px solid rgba(0,0,0,0.2); padding-top:5px;"><div style="display:flex; align-items:center; gap:4px;"><span>弱:</span>${weakIcon}</div><div style="display:flex; align-items:center; gap:4px;"><span>抗:</span>${resIcon}</div></div>
            </div>`;
        document.getElementById('inspect-content').innerHTML = cardHtml; document.getElementById('inspect-modal').style.display = 'flex';
    };
    window.closeInspect = function() { document.getElementById('inspect-modal').style.display = 'none'; };

    window.render = function() {
        const drawSide = (t) => {
            const team = window.state.teams[t]; const isMyTurn = (t === window.state.currentTeam && window.state.step !== 'setup');
            const lives = 3 - team.lostLives; let fireHtml = ''; 
            for(let i=0; i<3; i++) fireHtml += (i < lives ? '🔥' : '<span style="filter:grayscale(100%); opacity:0.3;">🔥</span>');
            
            document.getElementById(`side-${t}`).className = `team-container ${isMyTurn ? 'active-team' : ''}`;
            document.getElementById(`header-${t}`).innerHTML = `<h2>TEAM ${t} ${fireHtml}</h2>`;

            let benHtml = '', actHtml = '';
            team.pokemon.forEach((p, pIdx) => {
                const isActive = (pIdx === team.activeIdx);
                const hpPer = (p.currHp / p.hp) * 100;
                let isValidTarget = false;
                if(isMyTurn && window.state.selectedHandItem) {
                    const hCard = window.state.selectedHandItem.data;
                    if(hCard.cardType === 'energy' && p.currHp > 0) isValidTarget = true;
                    if(hCard.target === 'ally' && p.currHp > 0) isValidTarget = true;
                    if(hCard.target === 'active_ally' && isActive && p.currHp > 0) isValidTarget = true;
                    if(hCard.target === 'bench' && !isActive && p.currHp > 0) isValidTarget = true;
                    if(hCard.target === 'dead_ally' && p.currHp <= 0) isValidTarget = true;
                }
                
                // 🌟 新增：當進入「全場狙擊」模式時，所有對手未陣亡寶可夢皆可選
                if (window.state.step === 'select_enemy_any_snipe' && p.currHp > 0 && t !== window.state.currentTeam) isValidTarget = true;
                if (window.state.step === 'select_ally_heal_50' && p.currHp > 0 && t === window.state.currentTeam) isValidTarget = true;

                const weakIcon = p.weakness === 'none' ? '無' : (Array.isArray(p.weakness) ? p.weakness.map(w => `<div class="energy-icon energy-${w}"></div>`).join('') : `<div class="energy-icon energy-${p.weakness}"></div>`);
                const resIcon = p.resistance.type === 'none' ? '無' : `<div class="energy-icon energy-${p.resistance.type}"></div>`;
                
                let statusHtml = ''; if (p.status.poison) statusHtml += '<span class="status-tag status-poison">中毒</span>'; if (p.status.burn) statusHtml += '<span class="status-tag status-burn">灼伤</span>'; if (p.status.asleep) statusHtml += '<span class="status-tag status-asleep">睡眠</span>'; if (p.status.confused) statusHtml += '<span class="status-tag status-confused">混亂</span>'; if (p.status.paralyze) statusHtml += '<span class="status-tag status-paralyze">麻痺</span>'; if (p.status.immune_next) statusHtml += '<span class="status-tag status-immune">免傷</span>'; if (p.status.cant_attack > 0) statusHtml += '<span class="status-tag status-cant-act">禁攻</span>';
                let buffHtml = ''; if (p.buff.turns > 0) buffHtml += `<div class="item-tag">💪攻擊+${p.buff.dmg}</div>`; if (p.buff.hasFocusSash) buffHtml += `<div class="item-tag">🎗️披帶</div>`; if (p.buff.fullFaceGuard > 0) buffHtml += `<div class="item-tag">🛡️-20</div>`; if (p.buff.potHelmet > 0) buffHtml += `<div class="item-tag">🪖-40</div>`;
                const deadClass = p.currHp <= 0 ? (isValidTarget ? 'dead revivable' : 'dead') : '';
                const headerClass = isActive ? 'active-header' : 'bench-header';

                let cardHtml = `
                    <div class="card type-${p.type} ${isActive ? 'card-active is-active-fighter' : 'card-bench'} ${deadClass} ${isValidTarget && p.currHp>0 ? 'valid-target' : ''}" id="${p.uid}" onclick="window.clickPokemon(${t}, ${pIdx})">
                        <div class="inspect-btn" onclick="event.stopPropagation(); window.inspectCard(${t}, ${pIdx})">🔍</div>
                        <div class="${headerClass}"><span class="name-text">${p.name}</span><span class="hp-text" style="color: ${hpPer < 30 ? '#ff0000' : '#000'};">HP ${p.currHp}/${p.hp}</span></div>
                        <div class="status-container">${statusHtml}</div>
                        <div class="hp-bar"><div class="hp-fill" style="width:${Math.max(0, hpPer)}%; background:${hpPer < 30 ? '#ff4422' : '#4caf50'}"></div></div>
                        <div class="card-img"><img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${p.id}.png" onerror="this.src='https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/0.png'"><div class="buff-container">${buffHtml}</div></div>
                        <div class="energy-container">${p.attachedEnergy.map(e => `<div class="energy-icon energy-${e}"></div>`).join('')}</div>
                `;

                if(isActive) {
                    cardHtml += `<div style="margin-top:5px">
                        ${p.attacks.map((atk, aIdx) => {
                            const hasEnergy = window.canUseAttack(p, atk); const rowClass = (hasEnergy && isMyTurn && window.state.step === 'action') ? 'attack-ready' : 'attack-disabled';
                            let costHtml = `<div style="display:flex; flex-wrap:wrap; max-width:45px; gap:2px;">${atk.cost.map(c => `<div class="energy-icon energy-${c}"></div>`).join('')}</div>`;
                            return `<div class="attack-row ${rowClass}" onclick="event.stopPropagation(); window.executeAttack(event, ${t}, ${aIdx});"><div class="attack-cost">${costHtml}</div><span style="flex:1; margin-left:5px; font-weight:bold; white-space:nowrap; overflow:hidden;">${atk.n}${atk.desc ? '<span class="attack-special-icon">✨</span>' : ''}</span><span>${atk.d}</span></div>`;
                        }).join('')}
                    </div><div style="font-size:9px; opacity:0.8; margin-top:5px; display:flex; justify-content:space-between; align-items:center;"><div style="display:flex; align-items:center; gap:2px;"><span>弱:</span>${weakIcon}</div><div style="display:flex; align-items:center; gap:2px;"><span>抗:</span>${resIcon}</div></div>`;
                } else {
                    cardHtml += `<div class="bench-attack-preview">${p.attacks.map(atk => `<div>${atk.cost.map(c => `<div class="energy-icon energy-${c}" style="width:8px; height:8px;"></div>`).join('')}</div>`).join('')}</div>
                    <div style="font-size:9px; opacity:0.8; margin-top:auto; display:flex; justify-content:space-between; align-items:center; padding-top:4px;"><div style="display:flex; align-items:center; gap:2px;"><span>弱:</span>${weakIcon}</div><div style="display:flex; align-items:center; gap:2px;"><span>抗:</span>${resIcon}</div></div>`;
                }
                cardHtml += `</div>`;

                if(isActive) actHtml = `<div class="active-zone">${cardHtml}</div>`; else benHtml += cardHtml;
            });
            document.getElementById(`field-${t}`).innerHTML = (t===1) ? `<div class="bench-grid">${benHtml}</div>${actHtml}` : `${actHtml}<div class="bench-grid">${benHtml}</div>`;
            
            const handDiv = document.getElementById(`hand-${t}`); handDiv.innerHTML = '';
            team.hand.forEach((card, cIdx) => {
                const isSelected = (window.state.selectedHandItem && window.state.selectedHandItem.index === cIdx); const descText = card.desc ? card.desc.replace(/'/g, "\\'") : '';
                if(card.cardType === 'energy') {
                    handDiv.innerHTML += `<div class="hand-card hand-energy energy-${card.type} ${isSelected ? 'selected' : ''}" onclick="window.selectHandCard(${cIdx})" onmouseenter="window.showHandTooltip(${t}, '💡 提供 1 個 [${window.getTypeName(card.type)}] 能量')" onmouseleave="window.hideHandTooltip(${t})"><div class="energy-icon energy-${card.type}" style="width:25px;height:25px;margin-bottom:5px;"></div><div style="color:white;text-shadow:1px 1px 2px #000;">能量</div></div>`;
                } else {
                    handDiv.innerHTML += `<div class="hand-card hand-trainer ${isSelected ? 'selected' : ''}" onclick="window.selectHandCard(${cIdx})" onmouseenter="window.showHandTooltip(${t}, '💡 ${descText}')" onmouseleave="window.hideHandTooltip(${t})"><div style="font-size:24px; margin-bottom:2px;">${card.icon}</div><div style="white-space:nowrap; transform:scale(0.85);">${card.name}</div></div>`;
                }
            });
        };
        drawSide(1); drawSide(2);
        
        const turnInd = document.getElementById('turn-indicator'); const actionHint = document.getElementById('action-hint');
        const setupUI = document.getElementById('setup-ui'); const endBtn = document.getElementById('end-turn-btn');
        if (window.state.step === 'setup') {
            turnInd.style.display = 'none'; actionHint.style.display = 'none'; endBtn.style.display = 'none'; setupUI.style.display = 'flex';
            document.getElementById('btn-redraw').disabled = window.state.redrawsLeft <= 0; document.getElementById('btn-redraw').textContent = `🔄 重抽卡牌 (${window.state.redrawsLeft})`;
        } else {
            setupUI.style.display = 'none'; turnInd.style.display = 'block'; actionHint.style.display = 'block';
            turnInd.textContent = window.state.step === 'must_swap' ? `⚠️ TEAM ${window.state.currentTeam} 必須換人！` : `▶ TEAM ${window.state.currentTeam} 的回合`;
            turnInd.style.color = '#ffcb05'; endBtn.style.display = window.state.step === 'action' ? 'block' : 'none';
        }
    };
</script>
</body>
</html>
