<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon TCG Pro: Quiz Battle - Ultra Edition</title>
    <style>
        :root{--team1-color:#2a75bb;--team2-color:#e3350d;--color-fire:#ff9d55;--color-water:#5090d6;--color-grass:#63bc5a;--color-electric:#f4d23c;--color-normal:#a8a878;--color-any:#eeeeee}
        *{box-sizing:border-box;margin:0;padding:0;font-family:'Noto Sans TC',Arial,sans-serif;user-select:none}
        
        /* 整體背景鎖死，不允許瀏覽器預設捲動 */
        body{background:#0a0a0c;color:#fff;width:100vw;height:100vh;overflow:hidden;display:flex;flex-direction:column;}
        
        #fx-canvas{position:fixed;top:0;left:0;width:100vw;height:100vh;pointer-events:none;z-index:9999}

        /* 大廳佈局：加入 flex 排版與等高設定 */
        #lobby{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;z-index:20;background:#0a0a0c;position:absolute;width:100%;height:100%;overflow-y:auto;}
        .config-box{position:relative; z-index:10; background:#111;padding:30px;border-radius:24px;border:2px solid #ffcb05;width:100%;max-width:850px;text-align:center;box-shadow:0 0 30px rgba(255,203,5,.2); margin: auto; transform-origin: center center;}
        
        /* 模式 A、B 區塊對齊與專屬按鈕 */
        .upload-section { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; margin: 10px 0; border: 2px dashed #666; text-align: left; display: flex; flex-direction: column; min-height: 220px;}
        .cloud-input { width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: 1px solid #444; background: #000; color: #77cc55; font-size: 13px; outline:none; }
        .cloud-input:focus { border-color: #ffcb05; }
        #qInput { width: 100%; flex: 1; min-height: 50px; margin-bottom: 10px; padding: 12px; border-radius: 8px; font-size: 14px; background: #000; color: #fff; border: 1px solid #444; resize: none;}

        /* 吉祥物放大恢復 */
        .lobby-mascot { position: fixed; bottom: 5%; width: 260px; max-width: 25vw; filter: drop-shadow(0 10px 10px rgba(0,0,0,0.5)); animation: bounce 1.5s infinite alternate ease-in-out; pointer-events: none; z-index: 9999;}
        .mascot-left { left: 2%; }
        .mascot-right { right: 2%; animation-delay: 0.75s; }
        @keyframes bounce { 0% { transform: translateY(0); } 100% { transform: translateY(-20px); } }
        
        .start-btn-content { display: flex; align-items: center; justify-content: center; gap: 12px; }
        .pokeball-icon { width: 28px; height: 28px; }

        /* ==============================================================
           🚀 核心引擎：絕對置中 1280x720 比例縮放法
           ============================================================== */
        #battle-field {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: #0a0a0c;
            overflow: hidden;
        }

        #battle-scale-wrapper {
            width: 1280px;
            height: 720px;
            position: absolute;
            left: 50%;
            top: 50%;
            display: flex;
            flex-direction: column;
        }

        .battle-main { flex:1; display:flex; justify-content:space-between; align-items:stretch; padding:20px 10px; gap:15px; }
        
        .team-container { width:510px; display:flex; flex-direction:column; justify-content:space-between; gap:10px; padding:20px 15px; border-radius:25px; background:rgba(255,255,255,.03); border:3px solid transparent; transition:.3s;}
        .team-container.active-team{border-color:#00f2ff;background:linear-gradient(180deg,rgba(0,242,255,.05) 0,rgba(0,100,255,.15) 100%);box-shadow:0 0 30px rgba(0,242,255,.6),inset 0 0 20px rgba(0,150,255,.4);animation:neonPulse 2s infinite alternate}
        @keyframes neonPulse{0%{box-shadow:0 0 15px rgba(0,242,255,.4),inset 0 0 10px rgba(0,150,255,.3);border-color:#00c3ff}100%{box-shadow:0 0 35px rgba(0,242,255,.8),inset 0 0 25px rgba(0,150,255,.6);border-color:#00f2ff}}
        
        .field-area { display:flex; gap:15px; align-items:center; justify-content:center; }
        .bench-grid { display:grid; grid-template-columns:repeat(2,120px); grid-template-rows:repeat(2,auto); gap:10px; justify-content:center; }
        .active-zone { flex:0 0 auto; display:flex; justify-content:center; align-items:center; padding:6px; border:2px dashed #444; border-radius:12px; margin: 0 5px; }
        
        .hand-wrapper { position: relative; width: 100%; margin-top: auto; }
        .hand-tooltip { position: absolute; bottom: 100%; margin-bottom: 5px; left: 50%; transform: translateX(-50%); width: 95%; background: rgba(20, 20, 20, 0.9); color: #ffcb05; padding: 8px 12px; border-radius: 8px; font-size: 14px; font-weight: bold; text-align: center; border: 2px solid #ffcb05; z-index: 100; pointer-events: none; opacity: 0; transition: opacity 0.2s ease-in-out; box-shadow: 0 5px 15px rgba(0,0,0,0.7); line-height: 1.4; }
        .hand-tooltip.show { opacity: 1; }
        
        .hand-area{height:110px; background:rgba(0,0,0,.6); border-radius:12px; padding:8px; display:flex; flex-wrap:nowrap; gap:8px; align-items:center; justify-content:center; overflow:hidden;}
        .hand-card{position:relative; flex: 1 1 0; max-width:65px; min-width:35px; height:95px; border-radius:8px; padding:4px; cursor:pointer; text-align:center; font-size:12px; font-weight:700; border:2px solid #fff; transition:.2s; box-shadow:0 4px 8px rgba(0,0,0,.5); display:flex; flex-direction:column; align-items:center; justify-content:center; line-height:1.1}
        .hand-card:hover{transform:translateY(-8px) scale(1.1);filter:brightness(1.2);z-index:50;}
        .hand-card.selected{border-color:#0f0;transform:translateY(-10px);box-shadow:0 0 15px rgba(0,255,0,.5)}
        .hand-energy{background:#333}
        .hand-trainer{background:linear-gradient(135deg,#eee,#aaa);color:#222}

        .center-panel{width:210px; display:flex; flex-direction:column; align-items:center; justify-content:flex-start; padding:20px 10px; gap:10px; align-self: stretch;}
        #log{flex:1; width:100%; background:rgba(0,0,0,.7); border:1px solid #333; border-radius:8px; padding:10px; font-size:14px; color:#eee; overflow-y:auto; display:flex; flex-direction:column; gap:8px;}
        .log-entry{border-bottom:1px solid #222; padding-bottom:5px; animation:slideIn .3s ease-out; opacity:1 !important; line-height:1.4;}
        @keyframes slideIn{from{opacity:0;transform:translateX(10px)}to{opacity:1;transform:translateX(0)}}

        .card{flex-shrink:0; background:#fff;border-radius:8px;color:#222;padding:6px;font-size:12px;cursor:pointer;transition:transform .2s,box-shadow .2s;position:relative;border:3px solid transparent;box-shadow:0 6px 12px rgba(0,0,0,.5);display:flex;flex-direction:column;overflow:hidden}
        .card-active{width:180px; transform: scale(1.05);}
        .card-active .card-img{height:90px}
        .card-bench{width:120px}
        .card-bench .card-img{height:70px}
        .card-bench .attack-row{padding:3px;font-size:10px;margin-top:3px}
        
        .card.type-fire{background:var(--color-fire)}
        .card.type-water{background:var(--color-water)}
        .card.type-grass{background:var(--color-grass)}
        .card.type-electric{background:var(--color-electric)}
        .card.type-normal{background:var(--color-normal)}

        .card:hover{transform:translateY(-3px) scale(1.03);z-index:5}
        .card.is-active-fighter{border-color:gold;box-shadow:0 0 20px rgba(255,215,0,.6); z-index:10;}
        .card.dead{filter:grayscale(100%);opacity:.5;pointer-events:none;}
        .card.dead.revivable{pointer-events:auto;animation:pulse 1.5s infinite;border-color:#0f0;opacity:.8;filter:grayscale(30%)}
        .card.valid-target{border-color:#0f0;box-shadow:0 0 15px #0f0;animation:pulse 1.5s infinite}
        @keyframes pulse{0%,100%{box-shadow:0 0 5px #0f0}50%{box-shadow:0 0 20px #0f0}100%{box-shadow:0 0 5px #0f0}}

        .active-header { display:flex; flex-direction:row; justify-content:space-between; align-items:center; margin-left:20px; font-weight:900; margin-bottom:4px; font-size:14px;}
        .bench-header { display:flex; flex-direction:column; align-items:flex-start; margin-left:18px; font-weight:900; margin-bottom:4px; line-height:1.2; }
        .bench-header .name-text { font-size:12px; margin-bottom:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:100%; }
        .bench-header .hp-text { font-size:11px; font-weight:900; }
        
        .card-img{width:100%;background:white;border-radius:4px;display:flex;align-items:center;justify-content:center;overflow:hidden;border:2px solid #333;position:relative}
        .card-img img{width:85%;height:85%;object-fit:contain}
        .inspect-btn{position:absolute;top:-5px;left:-5px;background:rgba(0,0,0,.8);color:white;border-radius:50%;width:24px;height:24px;display:flex;justify-content:center;align-items:center;z-index:10;transition:transform .2s;border:1px solid #fff}
        .inspect-btn:hover{transform:scale(1.2);background:#ffcb05;color:black}
        
        .buff-container{position:absolute;top:4px;right:4px;display:flex;gap:3px;flex-direction:column;align-items:flex-end;z-index:5}
        .item-tag{background:#ffcb05;color:black;padding:3px 5px;border-radius:6px;font-size:9px;font-weight:bold;box-shadow:0 2px 4px rgba(0,0,0,.5);border:1px solid #000}
        #inspect-content .item-tag{font-size:14px;padding:4px 8px;border-radius:8px;}

        .status-container{position:absolute;bottom:3px;left:3px;display:flex;gap:2px;flex-wrap:wrap;z-index:5}
        .status-tag{padding:2px 4px;border-radius:3px;font-size:8px;font-weight:bold;color:white;border:1px solid rgba(255,255,255,.5)}
        .status-poison{background-color:#904090}
        .status-paralyze{background-color:#f4d23c;color:#000}
        .status-burn{background-color:#f40}
        .status-asleep{background-color:#555}
        .status-confused{background-color:#f90}
        
        .energy-container{display:flex;flex-wrap:wrap;gap:2px;margin-top:3px;min-height:14px;background:rgba(255,255,255,.3);border-radius:4px;padding:2px}
        .energy-icon{width:12px;height:12px;border-radius:50%;border:1px solid #000;display:inline-block}
        .energy-fire{background:var(--color-fire)}
        .energy-water{background:var(--color-water)}
        .energy-grass{background:var(--color-grass)}
        .energy-electric{background:var(--color-electric)}
        .energy-normal{background:var(--color-normal)}
        .energy-any{background:var(--color-any)}
        .energy-rainbow{background:conic-gradient(red,yellow,lime,aqua,blue,magenta,red)}
        
        .attack-row { margin-top: 4px; padding: 4px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.2s; border: 1px solid rgba(0,0,0,0.1); background: rgba(255,255,255,0.1); color: #222;}
        .attack-ready { background: rgba(255,255,255,0.95) !important; opacity: 1; box-shadow: 0 0 5px rgba(255,255,255,0.6); }
        .attack-ready:hover { transform: scale(1.02); background: #fff !important; }
        .attack-disabled { background: rgba(255,255,255,0.3) !important; opacity: 1; cursor: not-allowed; }
        .attack-disabled span { color: #333; } 
        .attack-special-icon { font-size: 9px; margin-left: 2px; color: #555; }
        
        .bench-attack-preview { margin-top:4px; display:flex; flex-direction:column; gap:3px; align-items:flex-start; background:rgba(255,255,255,0.1); border-radius:4px; padding:4px; }
        .bench-attack-preview > div { display:flex; gap:2px; justify-content:flex-start; }

        .hp-bar{height:6px;background:#333;border-radius:3px;margin:3px 0;overflow:hidden;border:1px solid #000}
        .hp-fill{height:100%;background:#4caf50;transition:width .3s}

        .game-modal{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.92);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:10000; border-radius: 20px;}
        .modal{position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,.95);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:20000}
        .modal-box{background:#1a1a1a;padding:30px;border-radius:20px;max-width:1000px;width:95%;text-align:center;border:2px solid #ffcb05;position:relative}
        .btn{padding:10px 20px;border-radius:8px;cursor:pointer;font-weight:bold;border:none;font-size:14px;transition:.3s;width:100%;display:block;margin-bottom:8px;}
        .btn:not(:disabled):hover{filter:brightness(1.3);transform:translateY(-2px)}
        .btn-disabled{opacity:0.4;cursor:not-allowed;}
        
        #setup-ui { display: flex; flex-direction: column; width: 100%; gap: 5px; margin-bottom: 10px; }

        .kahoot-btn { padding: 20px 30px; border-radius: 16px; border: none; color: white; font-weight: bold; cursor: pointer; transition: 0.2s; box-shadow: 0 6px 0 rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: flex-start; min-height: 130px; max-height: 180px; flex: 1 1 calc(50% - 30px); overflow: hidden; box-sizing: border-box;}
        .kahoot-btn:hover { filter: brightness(1.15); transform: translateY(-3px); box-shadow: 0 8px 0 rgba(0,0,0,0.3); }
        .kahoot-btn:active { transform: translateY(6px); box-shadow: 0 0 0 rgba(0,0,0,0.3); }
        .kb-red { background-color: #e21b3c; }
        .kb-blue { background-color: #1368ce; }
        .kb-yellow { background-color: #d89e00; }
        .kb-green { background-color: #26890c; }

        #inspect-content .card{width:320px;font-size:16px;padding:15px;cursor:default;box-shadow:0 0 40px rgba(255,255,255,.5)}
        #inspect-content .card-img{height:160px}
        #inspect-content .energy-icon{width:20px;height:20px}
        #inspect-content .attack-row{font-size:16px;padding:12px;margin-top:10px;}
        
        .hidden{display:none!important}
        
        .damage-pop{position:fixed;color:#f00;font-size:55px;font-weight:900;text-shadow:0 0 12px #fff;pointer-events:none;z-index:20001;animation:popUp 1s forwards}
        @keyframes popUp{0%{transform:scale(.5);opacity:1}100%{transform:translateY(-80px) scale(1.5);opacity:0}}
        
        .close-btn{position:absolute;top:10px;right:15px;font-size:24px;cursor:pointer;color:#000;font-weight:bold;transition:.2s}
        .close-btn:hover{transform:scale(1.2);color:#fff}
        
        .coin-container{perspective:1000px;margin:20px auto;width:150px;height:150px;cursor:pointer; transition:transform .2s}
        .coin-container:hover{transform:scale(1.1)}
        .coin-container.flipping{pointer-events:none}
        .coin{width:100%;height:100%;position:relative;transform-style:preserve-3d; transition: transform 2s cubic-bezier(0.2, 0.8, 0.3, 1);}
        .coin-face{position:absolute;width:100%;height:100%;border-radius:50%;backface-visibility:hidden;display:flex;align-items:center;justify-content:center;font-size:40px;font-weight:bold;box-shadow:0 0 20px rgba(0,0,0,.6); border:6px solid #333;}
        .coin-heads{background:linear-gradient(to bottom,#f44336 50%,#fff 50%);}
        .coin-heads::after{content:'';position:absolute;width:100%;height:8px;background:#333;top:50%;transform:translateY(-50%)}
        .coin-heads::before{content:'';position:absolute;width:36px;height:36px;background:#fff;border:6px solid #333;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);z-index:2}
        .coin-tails{background:#333;color:#fff;transform:rotateY(180deg);border-color:#888;}
    </style>
</head>
<body>

<canvas id="fx-canvas"></canvas>

<!-- 系統彈窗 -->
<div id="sys-alert" class="modal" style="z-index: 99999;">
    <div class="modal-box" style="border-color: #ff4444; padding: 40px; max-width: 500px;">
        <div id="sys-alert-msg" style="font-size: 24px; margin-bottom: 30px; line-height:1.5;"></div>
        <button class="btn" style="background:#ffcb05; color:black; font-size:18px; padding:10px 40px; width:auto; margin:0 auto;" onclick="document.getElementById('sys-alert').style.display='none'">確定</button>
    </div>
</div>

<div id="sys-confirm" class="modal" style="z-index: 99999;">
    <div class="modal-box" style="border-color: #ffcb05; padding: 40px; max-width: 500px;">
        <div id="sys-confirm-msg" style="font-size: 24px; margin-bottom: 30px; line-height:1.5;"></div>
        <div style="display:flex; gap:20px; justify-content:center;">
            <button id="sys-confirm-yes" class="btn" style="background:var(--team1-color); color:white; font-size:18px; padding:10px 30px; width:auto; margin:0;">確定</button>
            <button class="btn" style="background:var(--team2-color); color:white; font-size:18px; padding:10px 30px; width:auto; margin:0;" onclick="document.getElementById('sys-confirm').style.display='none'">取消</button>
        </div>
    </div>
</div>

<div id="lobby">
    <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/25.png" class="lobby-mascot mascot-left">
    <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/4.png" class="lobby-mascot mascot-right">
    
    <div class="config-box">
        <h1 style="color: #ffcb05; margin-bottom: 10px; font-size: 36px;">Pokémon TCG Pro</h1>
        <p style="margin-bottom: 20px; color: #aaa;">終極平衡版：遊戲引擎級縮放防跑版 & 智慧答題系統！</p>
        
        <div style="display:flex; gap:20px; margin-top:10px;">
            <div class="upload-section" style="flex:1;">
                <h3 style="color: #77cc55; margin-bottom:8px;">🌐 模式 A：Google 試算表</h3>
                <p style="font-size:11px; color:#ccc; margin-bottom:10px;">格式：題號 | 題目 | 選項... | 答案</p>
                <input type="text" id="cloud-url" class="cloud-input" placeholder="貼上 Google 試算表分享網址" style="margin-bottom:10px;">
                <button class="btn" style="background:#77cc55; color:#000; padding:10px; font-weight:bold; margin-top:auto;" onclick="fetchCloudCSV()">載入連結</button>
                <div id="cloud-status" style="color: #ffcb05; font-size: 13px; font-weight:bold; margin-top:8px;"></div>
            </div>
            
            <div class="upload-section" style="flex:1;">
                <h3 style="color: #3399ff; margin-bottom:8px;">📝 模式 B：手動輸入題庫</h3>
                <p style="font-size:11px; color:#ccc; margin-bottom:10px;">由老師判定答對或答錯。多題請用 / 分隔：</p>
                <textarea id="qInput" placeholder="題目1 / 題目2 / ..."></textarea>
                <button class="btn" style="background:#3399ff; color:#fff; padding:10px; font-weight:bold; margin-top:auto;" onclick="loadManualQs()">確認題庫</button>
            </div>
        </div>

        <div class="upload-section mode-c" style="text-align: center; border: 2px dashed #666; margin-top: 15px;">
            <h3 style="color: #ff9d55; margin-bottom:5px;">📁 模式 C：上傳本地 CSV 檔案</h3>
            <p style="font-size:11px; color:#ccc; margin-bottom:10px;">第一欄填題號，最後一欄填解答數字(1-4)</p>
            <input type="file" id="csv-file" accept=".csv" style="color:white; font-size:14px; margin: 0 auto; display: block;" onchange="loadLocalCSV(event)">
        </div>

        <button class="btn" style="background:#ffcb05; color:black; width:260px; margin:15px auto 0; padding:12px; font-size:24px; border-radius:30px; font-weight:900; letter-spacing:2px;" onclick="initGame()">
            <div class="start-btn-content">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Pok%C3%A9_Ball_icon.svg" class="pokeball-icon">
                START
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Pok%C3%A9_Ball_icon.svg" class="pokeball-icon">
            </div>
        </button>

        <div style="text-align: center; margin-top: 20px;">
            <button class="btn" style="background:#444; color:#fff; width:200px; font-size:12px; opacity:0.6; margin: 0 auto;" onclick="uploadDataToFirestore()">☁️ 同步角色資料至雲端</button>
        </div>
    </div>
</div>

<div id="battle-field" class="hidden">
    <div id="battle-scale-wrapper" style="height: 720px;">
        <div class="battle-main">
            <!-- TEAM 1 -->
            <div id="side-1" class="team-container">
                <div id="header-1" style="display:flex; justify-content:center; align-items:center; gap:10px;"></div>
                <div class="field-area" id="field-1"></div>
                <div class="hand-wrapper">
                    <div id="hand-tooltip-1" class="hand-tooltip"></div>
                    <div style="font-size: 12px; margin-bottom: 4px; font-weight:bold; color:#ccc;">手牌區 (最多7張)：</div>
                    <div class="hand-area" id="hand-1"></div>
                </div>
            </div>

            <!-- 中央控制區 -->
            <div class="center-panel">
                <h2 id="turn-indicator" style="margin-bottom: 8px; font-size: 18px; font-weight:900; text-align: center; color: #ffcb05; text-shadow: 0 0 8px rgba(255, 203, 5, 0.8);"></h2>
                <div id="action-hint" style="color: #bbb; font-size: 13px; text-align: center; margin-bottom: 8px; min-height: 35px; line-height:1.4;"></div>
                
                <div id="setup-ui">
                    <button id="btn-redraw" class="btn" style="background:#ffcb05; color:black; font-size:16px;" onclick="redrawCards()">🔄 重抽卡牌 (2)</button>
                    <button class="btn" style="background:var(--team1-color); color:white; font-size:16px;" onclick="startGame(1)">▶ TEAM 1 先攻</button>
                    <button class="btn" style="background:var(--team2-color); color:white; font-size:16px;" onclick="startGame(2)">▶ TEAM 2 先攻</button>
                </div>
                
                <button id="end-turn-btn" class="btn" style="background:#333; color:white; display: none; font-size:16px;" onclick="endTurn()">結束回合</button>
                <div id="log"></div>
            </div>

            <!-- TEAM 2 -->
            <div id="side-2" class="team-container">
                <div id="header-2" style="display:flex; justify-content:center; align-items:center; gap:10px;"></div>
                <div class="field-area" id="field-2"></div>
                <div class="hand-wrapper">
                    <div id="hand-tooltip-2" class="hand-tooltip"></div>

    // --- Scale Wrapper 邏輯 ---
    function updateBattleScale() {
        const winW = window.innerWidth;
        const winH = window.innerHeight;
        const wrapper = document.getElementById('battle-scale-wrapper');
        if (wrapper) {
            const scale = Math.min(winW / 1280, winH / 720);
            wrapper.style.transform = `translate(-50%, -50%) scale(${scale})`;
        }
        const lobbyBox = document.querySelector('.config-box');
        if (lobbyBox && !document.getElementById('lobby').classList.contains('hidden')) {
            const lobbyScale = Math.min(1, Math.min(winW / 900, winH / 750));
            lobbyBox.style.transform = `scale(${lobbyScale})`;
        }
    }
    window.addEventListener('resize', updateBattleScale);

    // --- 系統 UI 函數 ---
    function showAlert(msg) { document.getElementById('sys-alert-msg').innerText = msg; document.getElementById('sys-alert').style.display = 'flex'; }
    function showConfirm(msg, onYes) { document.getElementById('sys-confirm-msg').innerText = msg; document.getElementById('sys-confirm-yes').onclick = () => { document.getElementById('sys-confirm').style.display = 'none'; onYes(); }; document.getElementById('sys-confirm').style.display = 'flex'; }
    function showHandTooltip(team, text) { const el = document.getElementById('hand-tooltip-' + team); if (el && text) { el.innerText = text; el.classList.add('show'); } }
    function hideHandTooltip(team) { const el = document.getElementById('hand-tooltip-' + team); if (el) el.classList.remove('show'); }
    function getTypeName(eng) { const map = { fire: '火', water: '水', grass: '草', electric: '電', normal: '普', none: '無', poison: '毒', dragon: '龍', psychic: '超能', any: '任', rainbow: '彩虹' }; return map[eng] || eng; }
    function updateHint(txt) { document.getElementById('action-hint').innerText = txt; }
    function addLog(msg) {
        const l = document.getElementById('log'); const entry = document.createElement('div'); entry.className = 'log-entry'; entry.textContent = `[系統] ${msg}`;
        l.insertBefore(entry, l.firstChild); Array.from(l.children).forEach(child => child.style.opacity = '1');
        if (l.children.length > 8) { l.removeChild(l.lastChild); }
    }

    function getSmartEnergyType(team) {
        let pool = new Set();
        team.pokemon.filter(p => p.currHp > 0).forEach(p => { pool.add(p.type); p.attacks.forEach(atk => { atk.cost.forEach(c => { if (c !== 'any') pool.add(c); }); }); });
        let poolArr = Array.from(pool); if (poolArr.length === 0) poolArr = ['normal'];
        let chosen = poolArr[Math.floor(Math.random() * poolArr.length)];
        if (Math.random() < 0.15) chosen = 'rainbow'; return chosen;
    }

    // --- ★ 視覺特效部分 ★ ---
    const fxCanvas = document.getElementById('fx-canvas'); const fxCtx = fxCanvas.getContext('2d');
    let fxParticles = [], fxSparks = [], fxProjectiles = [], fxSpecial = []; let screenShake = 0, hitStop = 0, fxFrame = 0;
    function resizeFxCanvas() { fxCanvas.width = window.innerWidth; fxCanvas.height = window.innerHeight; }
    window.addEventListener('resize', resizeFxCanvas); resizeFxCanvas();
    function getTypeColor(type) { const colors = { fire: '#FF4400', water: '#0088FF', grass: '#00FF44', electric: '#FFDD00', normal: '#FFFFFF', psychic: '#FF00FF', poison: '#A040A0', dragon: '#7038F8' }; return colors[type] || '#FFFFFF'; }
    
    function triggerModernHit(x, y, type, dmg) {
        const color = getTypeColor(type);
        fxSparks.push({ x, y, color, l: 1.0, scale: 0.2, maxScale: 0.8 + dmg/150 });
        for(let i=0; i<30; i++) fxParticles.push({ x, y, c: color, vx: (Math.random()-0.5)*12, vy: (Math.random()-0.5)*12, l: 1.0, d: 0.02, s: 6 + Math.random()*6 });
        screenShake = Math.min(40, 15 + dmg/8); hitStop = 8;
    }

    function triggerUltimateHit(tx, ty, type, dmg, sx, sy) {
        const color = getTypeColor(type);
        if (type === 'electric') {
            fxSpecial.push({ type: 'thunder', x: tx, y: ty, l: 1.0 });
            setTimeout(() => { triggerModernHit(tx, ty, type, dmg * 1.5); screenShake = 50; hitStop = 10; }, 150);
        } else {
            let count = 0;
            let burst = setInterval(() => {
                fxProjectiles.push({ x: sx + (Math.random()-0.5)*100, y: sy + (Math.random()-0.5)*100, tx: tx + (Math.random()-0.5)*60, ty: ty + (Math.random()-0.5)*60, c: color, type: type, speed: 0.15, progress: 0 });
                count++; if (count >= 10) { clearInterval(burst); setTimeout(() => { triggerModernHit(tx, ty, type, dmg); screenShake = 45; hitStop = 10; }, 150); }
            }, 60);
        }
    }

    function animateFx() {
        fxFrame++; if(hitStop > 0) { hitStop--; requestAnimationFrame(animateFx); return; }
        if(screenShake > 0) { document.body.style.transform = `translate(${(Math.random()-0.5)*screenShake}px, ${(Math.random()-0.5)*screenShake}px)`; screenShake *= 0.85; if(screenShake < 0.5) { screenShake = 0; document.body.style.transform = ''; } }
        fxCtx.clearRect(0, 0, fxCanvas.width, fxCanvas.height); fxCtx.globalCompositeOperation = 'lighter';
        fxSpecial = fxSpecial.filter(s => s.l > 0); fxSpecial.forEach(s => {
            if (s.type === 'thunder') {
                fxCtx.save(); fxCtx.strokeStyle = '#FFF'; fxCtx.shadowBlur = 50; fxCtx.shadowColor = '#FFDD00'; fxCtx.lineWidth = 30 * s.l;
                fxCtx.beginPath(); let x = s.x + (Math.random()-0.5)*200, y = 0; fxCtx.moveTo(x, y);
                while(y < s.y) { x += (Math.random()-0.5)*80; y += 50; fxCtx.lineTo(x, y); } fxCtx.stroke();
                fxCtx.restore(); s.l -= 0.15;
            }
        });

    function drawSparkV2(s) {

    function parseCSVData(text) {
        const lines = text.split(/\r\n|\n|\r/); 
        state.csvQuestions = [];
        let startIndex = 0;
        if (lines[0] && (lines[0].includes('題') || lines[0].includes('答') || lines[0].includes('選項') || lines[0].includes('Question') || lines[0].toLowerCase().includes('id'))) {
            startIndex = 1;
        }
        for(let i = startIndex; i < lines.length; i++) {
            let line = lines[i].trim();
            if(!line) continue;
            let cols = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.trim().replace(/^"(.*)"$/, '$1'));
            while(cols.length > 0 && cols[cols.length - 1] === "") { cols.pop(); }
            
            if(cols.length >= 4) {
                let qId = cols[0]; let qText = cols[1]; let ans = parseInt(cols[cols.length - 1]); 
                let opts = cols.slice(2, cols.length - 1).filter(o => o !== ""); 
                if(!isNaN(ans) && ans >= 1 && ans <= opts.length) {
                    state.csvQuestions.push({ id: qId, q: qText, opts: opts, ans: ans });
                }
            }
        }
        if(state.csvQuestions.length > 0) state.quizMode = 'csv';
    }

    function fetchCloudCSV() {
        let url = document.getElementById('cloud-url').value.trim(); if(!url) return;
        document.getElementById('cloud-status').innerText = "⏳ 解析連結中...";
        const idMatch = url.match(/\/d\/([a-zA-Z0-9-_]+)/);
        if (!idMatch || !idMatch[1]) { document.getElementById('cloud-status').innerText = "❌ 無法解析網址，請確認包含 /d/ 試算表ID"; return; }
        
        const sheetId = idMatch[1]; const callbackName = 'gvizCallback_' + Date.now();
        window[callbackName] = function(data) {
            try {
                state.csvQuestions = []; let rows = data.table.rows; let startIdx = 0;
                if(rows.length > 0 && rows[0].c[0] && rows[0].c[0].v && typeof rows[0].c[0].v === 'string') {
                    const firstCell = rows[0].c[0].v.toLowerCase();
                    if(firstCell.includes('題') || firstCell.includes('question') || firstCell.includes('答') || firstCell.includes('id')) { startIdx = 1; }
                }
                for(let i = startIdx; i < rows.length; i++) {
                    let row = rows[i]; if(!row.c || !row.c[0] || row.c[0].v === null || row.c[0].v === undefined) continue;
                    let cols = row.c.map(cell => (cell && cell.v !== null && cell.v !== undefined) ? cell.v.toString().trim() : "");
                    while(cols.length > 0 && cols[cols.length - 1] === "") { cols.pop(); }
                    if(cols.length >= 4) {
                        let qId = cols[0], qText = cols[1], ans = parseInt(cols[cols.length - 1]);
                        let opts = cols.slice(2, cols.length - 1).filter(o => o !== "");
                        if(!isNaN(ans) && ans > 0 && ans <= opts.length) { state.csvQuestions.push({ id: qId, q: qText, opts: opts, ans: ans }); }
                    }
                }
                if (state.csvQuestions.length > 0) {
                    state.quizMode = 'csv'; document.getElementById('cloud-status').innerText = `✅ 連線成功！讀取到 ${state.csvQuestions.length} 題。`;
                } else throw new Error("No valid data");
            } catch (e) { document.getElementById('cloud-status').innerText = "❌ 解析失敗。請確認格式（第1欄:題號, 第2欄:題目, 中間:選項, 最後1欄:解答數字）。"; }
            delete window[callbackName]; document.getElementById(callbackName).remove();
        };
        const script = document.createElement('script'); script.id = callbackName;
        script.src = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=responseHandler:${callbackName}`;
        script.onerror = function() { document.getElementById('cloud-status').innerText = "❌ 連線失敗。請確認試算表「共用」設定。"; delete window[callbackName]; script.remove(); };
        document.body.appendChild(script);
    }

    function loadLocalCSV(e) {

    function checkAnswer(correct) {

    function clickPokemon(teamNum, pIdx) {

        const team = state.teams[teamNum]; const p = team.pokemon[pIdx];

        if (p.currHp <= 0) { let isReviving = state.selectedHandItem && state.selectedHandItem.data.target === 'dead_ally' && teamNum === state.currentTeam; if (!isReviving) return; }
        if(state.step === 'must_swap' && teamNum === state.currentTeam && pIdx !== team.activeIdx && p.currHp > 0) {
            team.pokemon[team.activeIdx].status = { poison: false, paralyze: false, burn: false, asleep: false, confused: false, immune_next: false, reduce_dmg_20: false, reduce_dmg_30: false, reduce_dmg_50: false, cant_attack: 0, enemy_dmg_minus_30: 0 };

        }
        if (state.step === 'select_enemy_bench') {
            if (teamNum !== state.currentTeam && pIdx !== state.teams[teamNum].activeIdx && p.currHp > 0) { retreatToBench(state.teams[teamNum], pIdx); addLog(`💨 強制將 ${p.name} 拖入戰場！`); state.step = 'finished'; render(); setTimeout(processEndOfTurn, 1500); } 
            else { showAlert("請選擇對手後備區寶可夢！"); } return;
        }
        if (state.step === 'select_transform_target') {

                const attacker = state.transformingPokemon;

                attacker.name = p.name; attacker.hp = p.hp; attacker.type = p.type; attacker.attacks = p.attacks; attacker.weakness = p.weakness; attacker.resistance = p.resistance; attacker.id = p.id; attacker.attachedEnergy = [...p.attachedEnergy];

        }

        if(state.step !== 'action') return;

        if(state.selectedHandItem) {
            const card = state.selectedHandItem.data; let valid = false;
            if(card.cardType === 'energy' && teamNum === state.currentTeam && p.currHp > 0) valid = true;
            if(card.target === 'ally' && teamNum === state.currentTeam && p.currHp > 0) valid = true;
            if(card.target === 'active_ally' && teamNum === state.currentTeam && pIdx === team.activeIdx && p.currHp > 0) valid = true;
            if(card.target === 'bench' && teamNum === state.currentTeam && pIdx !== team.activeIdx && p.currHp > 0) valid = true;
            if(card.target === 'dead_ally' && teamNum === state.currentTeam && p.currHp <= 0) valid = true;
            if(card.target === 'enemy_bench' && teamNum !== state.currentTeam && pIdx !== state.teams[teamNum].activeIdx && p.currHp > 0) valid = true;
            if(!valid) return;

            if (card.id === 'pot_helmet' && p.hp >= 100) { return showAlert("「鍋型頭盔」僅限最大 HP 小於 100 的寶可夢裝備！"); }

            if(card.cardType === 'energy') {
                p.attachedEnergy.push(card.type); state.teams[state.currentTeam].hand.splice(state.selectedHandItem.index, 1); state.hasAttachedEnergyThisTurn = true;

        }
    }

    function useTrainerCard(teamNum, targetIdx) {
        const myTeam = state.teams[state.currentTeam]; const card = state.selectedHandItem.data; let consumed = true;
        if(card.id === 'pokemon_catcher') {
            state.pendingCatcherTarget = targetIdx; state.coinFlipReason = 'catcher';
            document.getElementById('coin-desc').innerHTML = `請擲硬幣：<br>正面則強制對手替換。`;

        if(card.id === 'potion' || card.id === 'super_potion') {
            const p = myTeam.pokemon[targetIdx]; if(p.currHp === p.hp) return showAlert("HP 已滿！");
            const heal = card.id === 'potion' ? 30 : 50; p.currHp = Math.min(p.hp, p.currHp + heal); addLog(`💊 ${p.name} 回復了 ${heal} HP。`);
        } 
        else if(card.id === 'full_heal') { const p = myTeam.pokemon[targetIdx]; p.status.poison = false; p.status.paralyze = false; p.status.burn = false; p.status.asleep = false; p.status.confused = false; addLog(`🌿 ${p.name} 解除異常狀態。`); }
        else if(card.id === 'switch') { retreatToBench(myTeam, targetIdx); addLog(`🔄 無消耗將 ${myTeam.pokemon[targetIdx].name} 換上場。`); }
        else if(card.id === 'rescue_stretcher') { const p = myTeam.pokemon[targetIdx]; p.currHp = Math.ceil(p.hp / 2); p.isDead = false; addLog(`🚑 ${p.name} 復活！`); }
        else if(card.id === 'boss_orders') { const enemyTeam = state.teams[teamNum]; retreatToBench(enemyTeam, targetIdx); addLog(`🗣️ 強制對手換上 ${enemyTeam.pokemon[targetIdx].name}。`); }
        else if(card.id === 'muscle_band') { const p = myTeam.pokemon[targetIdx]; p.buff.dmg = 20; p.buff.turns = 2; addLog(`💪 ${p.name} 攻擊力+20！`); }
        else if(card.id === 'focus_sash') { const p = myTeam.pokemon[targetIdx]; p.buff.hasFocusSash = true; addLog(`🎗️ ${p.name} 裝備披帶！`); }
        else if(card.id === 'full_face_guard') { const p = myTeam.pokemon[targetIdx]; p.buff.fullFaceGuard = 4; addLog(`🛡️ ${p.name} 裝備了全罩防守(3回合)！`); }
        else if(card.id === 'pot_helmet') { const p = myTeam.pokemon[targetIdx]; p.buff.potHelmet = 3; addLog(`🪖 ${p.name} 裝備了鍋型頭盔(2回合)！`); }
        else if(card.id === 'energy_search') {
            if (myTeam.hand.length < 7) myTeam.hand.push({ cardType: 'energy', type: getSmartEnergyType(myTeam) });
            if (myTeam.hand.length < 7) myTeam.hand.push({ cardType: 'energy', type: getSmartEnergyType(myTeam) });

        }
        else if(card.id === 'prof_research') {
            addLog(`🔬 捨棄手牌重新抽卡。`); myTeam.hand.splice(state.selectedHandItem.index, 1); myTeam.hand = []; 
            const tDB = window.CLOUD_TRAINERS_DB || (typeof TRAINERS_DB !== 'undefined' ? TRAINERS_DB : []);
            for(let i=0; i<3; i++){ if(Math.random() < 0.6 && myTeam.hand.length < 7) { myTeam.hand.push({ cardType: 'energy', type: getSmartEnergyType(myTeam) }); } else if (myTeam.hand.length < 7 && tDB.length > 0) { const trainer = tDB[Math.floor(Math.random() * tDB.length)]; myTeam.hand.push({ cardType: 'trainer', ...trainer }); } }
            consumed = false;

        if (consumed) { myTeam.hand.splice(state.selectedHandItem.index, 1); }
        state.selectedHandItem = null; updateHint("訓練家卡使用完畢。"); render();
    }

    function canUseAttack(pokemon, attack) {
        let eCopy = [...pokemon.attachedEnergy]; let rainbowCount = eCopy.filter(e => e === 'rainbow').length; eCopy = eCopy.filter(e => e !== 'rainbow');
        for(let costType of attack.cost) { if(costType !== 'any') { let idx = eCopy.indexOf(costType); if(idx !== -1) { eCopy.splice(idx, 1); } else if (rainbowCount > 0) { rainbowCount--; } else { return false; } } }
        let anyCount = attack.cost.filter(c => c === 'any').length; return (eCopy.length + rainbowCount) >= anyCount;
    }

    function executeAttackFromInspect(t, aIdx) { closeInspect(); setTimeout(() => { executeAttack(null, t, aIdx); }, 400); }

    function executeAttack(event, teamNum, atkIdx) {
        if (event) event.stopPropagation(); if (state.isAttacking) return; 
        try {
            if (teamNum !== state.currentTeam) return showAlert("無法使用對手招式！");
            if (state.step !== 'action') return showAlert("請先答對題目！");
            const myTeam = state.teams[state.currentTeam]; const attacker = myTeam.pokemon[myTeam.activeIdx];
            if (attacker.status.asleep) return showAlert("💤 睡眠中無法攻擊！");
            if (attacker.status.paralyze) return showAlert("⚡ 麻痺中無法攻擊！");
            if (attacker.status.cant_attack > 0) return showAlert("🚫 受副作用影響無法攻擊！");
            const atk = attacker.attacks[atkIdx]; if (!atk) return showAlert("招式錯誤！");
            if (!canUseAttack(attacker, atk)) return showAlert("能量不足！");

            state.isAttacking = true; state.pendingAttack = { attacker, atk, enemyTeamNum: state.currentTeam === 1 ? 2 : 1 };

            if (attacker.status.confused) {
                state.coinFlipReason = 'confusion';
                document.getElementById('coin-desc').innerHTML = `<b>${attacker.name}</b> 處於💫混亂狀態！<br>請擲硬幣，反面將自傷 30 點！`;
                const coinInner = document.getElementById('coin-inner'); if(coinInner) { coinInner.style.transition = 'none'; coinInner.style.transform = 'rotateY(0deg)'; }
                document.getElementById('coin-modal').style.display = 'flex'; return;
            }
            continueAttack();
        } catch (e) { state.isAttacking = false; showAlert("系統錯誤: " + e.message); console.error(e); }
    }

    function continueAttack() {
        const atk = state.pendingAttack.atk;
        if (atk.special && typeof atk.special === 'string' && atk.special.includes('flip') && !atk.special.startsWith('flip_')) {
            state.coinFlipReason = 'attack'; let desc = '發動招式附加效果：<br>';
            const flipDescMap = {
                'paralyze_flip': '若為正面，對手麻痺！', 'poison_flip': '若為正面，對手中毒！', 'burn_flip': '若為正面，對手灼傷！',
                'confuse_flip': '若為正面，對手混亂！', 'immune_next_flip': '若為正面，下回合免傷！', 'reduce_dmg_taken_flip': '若為正面，下回合受傷減輕！',
                'reduce_dmg_taken_flip_30': '若為正面，下回受傷-30！', 'dmg_flip': '必須正面才能造成傷害！', 'discard_enemy_energy_flip': '若為正面，丟棄對手能量！',
                'asleep_flip': '若為正面，對手睡眠！', 'confuse_self_flip': '若為反面，自己混亂！'
            };
            if (atk.special.includes('damage_flip')) desc += '若為正面，造成額外傷害！';
            else if (flipDescMap[atk.special]) desc += flipDescMap[atk.special];
            else desc += '依據硬幣結果觸發效果！';

            document.getElementById('coin-desc').innerHTML = desc; const coinInner = document.getElementById('coin-inner'); if(coinInner) { coinInner.style.transition = 'none'; coinInner.style.transform = 'rotateY(0deg)'; }
            document.getElementById('coin-modal').style.display = 'flex';
        } else if (atk.special === 'flip_3_x20' || atk.special === 'flip_3_x30') { state.coinFlipsQueue = 3; state.coinFlipsResults = 0; promptMultiFlip(); } 
        else if (atk.special === 'flip_2_x20' || atk.special === 'flip_2_x30') { state.coinFlipsQueue = 2; state.coinFlipsResults = 0; promptMultiFlip(); } 
        else { resolveAttack(null); }
    }

    function promptMultiFlip() {
        if (state.coinFlipsQueue > 0) {
            state.coinFlipReason = 'multi_attack'; document.getElementById('coin-desc').innerHTML = `連續擲硬幣！<br>剩餘 <b>${state.coinFlipsQueue}</b> 次機會：`;
            const coinInner = document.getElementById('coin-inner'); if(coinInner) { coinInner.style.transition = 'none'; coinInner.style.transform = 'rotateY(0deg)'; }
            document.getElementById('coin-modal').style.display = 'flex';
        } else { resolveAttack(state.coinFlipsResults); }
    }

    function autoFlipCoin() {
        const coinBtn = document.getElementById('auto-coin'); if (coinBtn && coinBtn.classList.contains('flipping')) return;
        if(coinBtn) coinBtn.classList.add('flipping'); const coinInner = document.getElementById('coin-inner'); const isHeads = Math.random() < 0.5;
        const spins = 5; const deg = spins * 360 + (isHeads ? 0 : 180);
        if(coinInner) { coinInner.style.transition = 'transform 2s cubic-bezier(0.2, 0.8, 0.3, 1)'; coinInner.style.transform = `rotateY(${deg}deg)`; }
        setTimeout(() => { if(coinBtn) coinBtn.classList.remove('flipping'); resolveCoinFlip(isHeads); setTimeout(() => { if(coinInner) { coinInner.style.transition = 'none'; coinInner.style.transform = `rotateY(0deg)`; } }, 500); }, 2100);
    }

    function resolveCoinFlip(isHeads) {
        document.getElementById('coin-modal').style.display = 'none'; const reason = state.coinFlipReason;
        if (reason === 'confusion') {
            if (isHeads) { addLog(`💫 克服混亂！`); continueAttack(); } 
            else {
                addLog(`💫 混亂發作，自傷 30 點。`); const attacker = state.pendingAttack.attacker; attacker.currHp = Math.max(0, attacker.currHp - 30); showDamage(attacker.uid, 30, 'normal', false, attacker.uid);
                if (attacker.currHp <= 0 && !attacker.isDead) { attacker.isDead = true; state.teams[state.currentTeam].lostLives++; addLog(`💀 ${attacker.name} 氣絕！`); if(checkGameOver()) return; }
                state.step = 'finished'; state.selectedHandItem = null; state.isAttacking = false; render(); setTimeout(processEndOfTurn, 1500);
            }
        } else if (reason === 'catcher') {
            const enemyTeamNum = state.currentTeam === 1 ? 2 : 1; const enemyTeam = state.teams[enemyTeamNum];
            if (isHeads) { addLog(`🪤 強制對手換上 ${enemyTeam.pokemon[state.pendingCatcherTarget].name}。`); retreatToBench(enemyTeam, state.pendingCatcherTarget); } else { addLog(`🪤 捕捉器失效。`); }
            if (state.selectedHandItem) { state.teams[state.currentTeam].hand.splice(state.selectedHandItem.index, 1); }
            state.selectedHandItem = null; updateHint("訓練家卡使用完畢。"); render();
        } else if (reason === 'attack') { resolveAttack(isHeads); } 
        else if (reason === 'multi_attack') { if(isHeads) state.coinFlipsResults++; state.coinFlipsQueue--; promptMultiFlip(); } 
        else if (reason === 'burn' || reason === 'asleep') {
            const flip = state.eotFlips.shift(); const p = state.teams[flip.team].pokemon[flip.pIdx];
            if (isHeads) { if (reason === 'burn') { p.status.burn = false; addLog(`🔥 解除灼傷。`); } if (reason === 'asleep') { p.status.asleep = false; addLog(`💤 醒來了。`); } } 
            else { if (reason === 'burn') addLog(`🔥 持續灼傷。`); if (reason === 'asleep') addLog(`💤 繼續熟睡。`); }
            render(); setTimeout(processNextEotFlip, 800);
        }
    }

    // --- ★ 招式戰鬥結算 (終極確保版) ★ ---
    function resolveAttack(coinResult) {
        try {
            const { attacker, atk, enemyTeamNum } = state.pendingAttack;
            const defender = state.teams[enemyTeamNum].pokemon[state.teams[enemyTeamNum].activeIdx];
            const isUltimate = (attacker.hp >= 100 && attacker.attacks.indexOf(atk) === 1);
            
            let dmg = atk.d; 
            let log = { text: `⚔️ ${attacker.name} 使用了「${atk.n}」！` };

            // ★ 核心重構：呼叫內建的招式效果字典
            if (atk.special && window.AttackEffects && window.AttackEffects[atk.special]) {
                const newDmg = window.AttackEffects[atk.special](attacker, defender, log, coinResult, dmg);
                if (newDmg !== undefined) dmg = newDmg;
            } else if (atk.special) {
                // 處理未放入字典的特殊動態效果
                if (atk.special === 'force_swap_choose') { const aliveBench = state.teams[enemyTeamNum].pokemon.filter((p, i) => i !== state.teams[enemyTeamNum].activeIdx && p.currHp > 0); if(aliveBench.length > 0) { state.step = 'select_enemy_bench'; state.pendingAttack = null; state.isAttacking = false; updateHint("請選擇對手後備寶可夢拖上場！"); render(); return; } else { log.text += ` (對手無後備，替換無效)`; } }
                if (atk.special === 'transform_choose') { state.step = 'select_transform_target'; state.transformingPokemon = attacker; state.pendingAttack = null; state.isAttacking = false; updateHint("請選擇對手進行複製！"); render(); return; }

                if(atk.special.includes('flip_') && atk.special.includes('x')) {
                    dmg = coinResult * parseInt(atk.special.split('x')[1]);
                    log.text += ` (擲出 ${coinResult} 次正面，造成 ${dmg} 傷害！)`;
                }
                if(atk.special === 'dmg_flip') {
                    if(!coinResult) { log.text += ' (硬幣反面，攻擊失敗無傷害)'; dmg = 0; }
                    else { log.text += ' (正面，攻擊成功！)'; }
                }
                
                if(atk.special === 'plus_dmg_per_elec') { let extra = attacker.attachedEnergy.filter(e => e === 'electric' || e === 'rainbow').length - 2; if(extra > 0) dmg += Math.min(2, extra) * 10; }
                if(atk.special === 'plus_dmg_per_water') { let extra = attacker.attachedEnergy.filter(e => e === 'water' || e === 'rainbow').length - 2; if(extra > 0) dmg += Math.min(2, extra) * 10; }

                if (atk.special === 'draw_1') {
                    const myTeam = state.teams[state.currentTeam];
                    if(myTeam.hand.length < 7) {
                        const tDB = window.CLOUD_TRAINERS_DB || (typeof TRAINERS_DB !== 'undefined' ? TRAINERS_DB : []);
                        if(Math.random() < 0.3 && tDB.length > 0) myTeam.hand.push({ cardType: 'trainer', ...tDB[Math.floor(Math.random() * tDB.length)] });
                        else myTeam.hand.push({ cardType: 'energy', type: getSmartEnergyType(myTeam) });
                        log.text += ` (隨機抽 1 張卡)`;
                    }
                }
                if (atk.special === 'draw_2') {
                    const myTeam = state.teams[state.currentTeam];
                    const tDB = window.CLOUD_TRAINERS_DB || (typeof TRAINERS_DB !== 'undefined' ? TRAINERS_DB : []);
                    let drawn = 0;
                    for(let k=0; k<2; k++) {
                        if(myTeam.hand.length < 7) {
                            if(Math.random() < 0.3 && tDB.length > 0) myTeam.hand.push({ cardType: 'trainer', ...tDB[Math.floor(Math.random() * tDB.length)] });
                            else myTeam.hand.push({ cardType: 'energy', type: getSmartEnergyType(myTeam) });
                            drawn++;
                        }
                    }
                    log.text += ` (隨機抽 ${drawn} 張卡)`;
                }
            }

            // 防禦減傷計算
            if(defender.status.immune_next) { 
                dmg = 0; log.text += ` (免疫！)`; 
            } else if (atk.special !== 'ignore_resistance') {
                if(defender.status.reduce_dmg_20) dmg = Math.max(0, dmg - 20);
                if(defender.status.reduce_dmg_30) dmg = Math.max(0, dmg - 30);
                if(defender.status.reduce_dmg_50) dmg = Math.max(0, dmg - 50);
            }
            if(attacker.status.enemy_dmg_minus_30 > 0) { dmg = Math.max(0, dmg - 30); log.text += ` (受牽制傷害-30)`; }

            // 最終傷害與抗性結算
            if(dmg > 0) {
                if(attacker.buff.turns > 0) dmg += attacker.buff.dmg;
                let isWeakness = false, isResisted = false;
                if(defender.weakness === attacker.type) { dmg = Math.floor(dmg * 1.5); isWeakness = true; }
                if (atk.special !== 'ignore_resistance' && (defender.resistance.type === attacker.type || defender.resistance.type === 'any')) { dmg -= defender.resistance.val; isResisted = true; }
                
                // 訓練家防禦卡減傷結算
                if (atk.special !== 'ignore_resistance') {
                    if (defender.buff.fullFaceGuard > 0) { dmg = Math.max(0, dmg - 20); log.text += ` (🛡️全罩防守-20)`; }
                    if (defender.buff.potHelmet > 0) { dmg = Math.max(0, dmg - 40); log.text += ` (🪖鍋型頭盔-40)`; }
                }

                dmg = Math.max(0, dmg); 
                if (defender.buff.hasFocusSash && defender.currHp === defender.hp && dmg >= defender.hp) { dmg = defender.hp - 10; defender.buff.hasFocusSash = false; log.text += ` 🎗️ 披帶發動！`; }
                defender.currHp = Math.max(0, defender.currHp - dmg);
                showDamage(defender.uid, dmg, attacker.type, isUltimate, attacker.uid);
                log.text += `造成 ${dmg} 傷害！`;
            } else if (atk.d > 0) { showDamage(defender.uid, 0, attacker.type, false, attacker.uid); }

            if (defender.currHp <= 0 && !defender.isDead) { defender.isDead = true; state.teams[enemyTeamNum].lostLives++; log.text += ` 💀 敵方氣絕！`; }
            if (attacker.currHp <= 0 && !attacker.isDead) { attacker.isDead = true; state.teams[state.currentTeam].lostLives++; log.text += ` 💀 我方氣絕！`; }

            addLog(log.text); 
            state.step = 'finished'; 
            state.selectedHandItem = null; 
            render(); 
            document.getElementById('end-turn-btn').style.display = 'block';
            
            if (checkGameOver()) return;
            setTimeout(() => { state.isAttacking = false; processEndOfTurn(); }, isUltimate ? 2500 : 1500);
            
        } catch (e) { state.isAttacking = false; showAlert("攻擊錯誤: " + e.message); console.error(e); }
    }

    function endTurn() { if(state.step === 'action' && !state.isAttacking) processEndOfTurn(); }

    function processEndOfTurn() {
        let someoneDied = false; state.eotFlips = [];
        [1, 2].forEach(t => {
            const activeP = state.teams[t].pokemon[state.teams[t].activeIdx];
            if (activeP && activeP.currHp > 0) {
                if (activeP.status.poison) { activeP.currHp = Math.max(0, activeP.currHp - 10); showDamage(activeP.uid, 10, 'poison'); addLog(`☠️ ${activeP.name} 中毒受傷。`); }
                if (activeP.status.burn) { activeP.currHp = Math.max(0, activeP.currHp - 20); showDamage(activeP.uid, 20, 'fire'); addLog(`🔥 ${activeP.name} 灼傷受傷。`); state.eotFlips.push({team: t, pIdx: state.teams[t].activeIdx, type: 'burn'}); }
                if (activeP.status.asleep) { state.eotFlips.push({team: t, pIdx: state.teams[t].activeIdx, type: 'asleep'}); }
                if (activeP.currHp <= 0 && !activeP.isDead) { activeP.isDead = true; state.teams[t].lostLives++; someoneDied = true; addLog(`💀 ${activeP.name} 氣絕！`); }
            }
            
            state.teams[t].pokemon.forEach(p => {
                if(p.currHp > 0 && t === state.currentTeam) {
                    if(p.buff.turns > 0) { p.buff.turns--; if(p.buff.turns === 0) p.buff.dmg = 0; }
                    if(p.buff.fullFaceGuard > 0) { p.buff.fullFaceGuard--; if(p.buff.fullFaceGuard === 0) addLog(`🛡️ ${p.name} 的全罩防守失效了。`); }
                    if(p.buff.potHelmet > 0) { p.buff.potHelmet--; if(p.buff.potHelmet === 0) addLog(`🪖 ${p.name} 的鍋型頭盔失效了。`); }
                }
            });

            if(activeP && activeP.status.cant_attack > 0 && t === state.currentTeam) { activeP.status.cant_attack--; }
            if(activeP && activeP.status.enemy_dmg_minus_30 > 0 && t === state.currentTeam) { activeP.status.enemy_dmg_minus_30--; }
        });

        const endingTeamActive = state.teams[state.currentTeam].pokemon[state.teams[state.currentTeam].activeIdx];
        if (endingTeamActive && endingTeamActive.status.paralyze) { endingTeamActive.status.paralyze = false; addLog(`⚡ ${endingTeamActive.name} 麻痺解除。`); }
        
        if (someoneDied && checkGameOver()) return;
        setTimeout(processNextEotFlip, 1000);
    }

    function processNextEotFlip() {
        if (state.eotFlips.length > 0) {
            const flip = state.eotFlips[0]; const p = state.teams[flip.team].pokemon[flip.pIdx];
            if (p.currHp <= 0) { state.eotFlips.shift(); processNextEotFlip(); return; }
            state.coinFlipReason = flip.type;
            document.getElementById('coin-desc').innerHTML = flip.type === 'burn' ? `請為 <b>${p.name}</b> 的🔥灼傷恢復擲硬幣：` : `請為 <b>${p.name}</b> 的💤睡眠恢復擲硬幣：`;
            const coinInner = document.getElementById('coin-inner'); if(coinInner) { coinInner.style.transition = 'none'; coinInner.style.transform = 'rotateY(0deg)'; }
            document.getElementById('coin-modal').style.display = 'flex';
        } else { state.nextTurnTeam = state.currentTeam === 1 ? 2 : 1; checkEotSwaps(); }
    }

    function checkEotSwaps() {
        let p1 = state.teams[1].pokemon[state.teams[1].activeIdx]; let p2 = state.teams[2].pokemon[state.teams[2].activeIdx];
        if (p1.currHp <= 0 && state.teams[1].lostLives < 3) { state.currentTeam = 1; state.step = 'must_swap'; updateHint("⚠️ TEAM 1 戰鬥寶可夢氣絕！請替換。"); render(); return; }
        if (p2.currHp <= 0 && state.teams[2].lostLives < 3) { state.currentTeam = 2; state.step = 'must_swap'; updateHint("⚠️ TEAM 2 戰鬥寶可夢氣絕！請替換。"); render(); return; }
        state.currentTeam = state.nextTurnTeam; state.nextTurnTeam = null; render(); setTimeout(startQuiz, 1000);
    }

    function checkGameOver() {
        let t1Dead = state.teams[1].lostLives >= 3; let t2Dead = state.teams[2].lostLives >= 3;
        if (t1Dead && t2Dead) { showVictory(0); return true; } if (t1Dead) { showVictory(2); return true; } if (t2Dead) { showVictory(1); return true; }
        return false;
    }

    function showVictory(winningTeamNum) {
        document.getElementById('victory-team-text').textContent = winningTeamNum === 0 ? `🤝 雙方同時陣亡，平手！ 🤝` : `🏆 TEAM ${winningTeamNum} 獲勝！ 🏆`;
        const summaryDiv = document.getElementById('wrong-answers-summary'); let summaryHtml = "";
        [1, 2].forEach(t => {
            const wrongs = state.teams[t].wrongAnswers;
            summaryHtml += `<h3 style="color:${t===1?'#00c3ff':'#ff6b6b'}; margin-top:${t===2?'15px':'0'}; margin-bottom:5px; font-size:18px;">Team ${t} 錯題題號：</h3>`;
            if(wrongs.length === 0) { summaryHtml += `<div style="font-size:16px; color:#aaa; margin-left:10px;">(無錯題紀錄！)</div>`; } 
            else {
                const wrongCounts = {}; wrongs.forEach(w => { wrongCounts[w] = (wrongCounts[w] || 0) + 1; });
                const formattedWrongs = Object.entries(wrongCounts).map(([w, count]) => count > 1 ? `<span style="color:#4caf50; font-weight:bold;">${w}(${count})</span>` : `<span style="font-weight:bold;">${w}</span>`);
                summaryHtml += `<div style="font-size:18px; margin-left:10px; color:#eee; line-height: 1.6; word-wrap: break-word; letter-spacing:1px;">${formattedWrongs.join('<span style="color:#888; margin:0 6px;">,</span>')}</div>`;
            }
        });
        summaryDiv.innerHTML = summaryHtml; summaryDiv.style.display = 'block'; document.getElementById('victory-modal').style.display = 'flex';
    }

    function inspectCard(t, pIdx) {
        const p = state.teams[t].pokemon[pIdx]; const resText = p.resistance.type !== 'none' && p.resistance.val > 0 ? `${getTypeName(p.resistance.type)} -${p.resistance.val}` : '無';
        let statusHtml = ''; if (p.status.poison) statusHtml += '<span class="status-tag status-poison">中毒</span>'; if (p.status.burn) statusHtml += '<span class="status-tag status-burn">灼傷</span>'; if (p.status.asleep) statusHtml += '<span class="status-tag status-asleep">睡眠</span>'; if (p.status.confused) statusHtml += '<span class="status-tag status-confused">混亂</span>'; if (p.status.paralyze) statusHtml += '<span class="status-tag status-paralyze">麻痺</span>'; if (p.status.immune_next) statusHtml += '<span class="status-tag status-immune">免傷</span>'; if (p.status.cant_attack > 0) statusHtml += '<span class="status-tag status-cant-act">無法攻擊</span>';
        
        let buffHtml = ''; 
        if (p.buff.turns > 0) buffHtml += `<div class="item-tag">💪攻擊+${p.buff.dmg}(${p.buff.turns})</div>`; 
        if (p.buff.hasFocusSash) buffHtml += `<div class="item-tag">🎗️氣勢披帶</div>`;
        if (p.buff.fullFaceGuard > 0) buffHtml += `<div class="item-tag">🛡️傷害-20(${p.buff.fullFaceGuard})</div>`; 
        if (p.buff.potHelmet > 0) buffHtml += `<div class="item-tag">🪖傷害-40(${p.buff.potHelmet})</div>`;
        
        let attacksHtml = '';
        const isMyActive = (t === state.currentTeam && pIdx === state.teams[t].activeIdx && state.step === 'action');

        p.attacks.forEach((atk, aIdx) => {
            let costHtml = ''; 
            if (atk.cost.length === 4) { 
                costHtml = `<div style="display:grid; grid-template-columns:1fr 1fr; gap:4px; width:36px; flex-shrink:0;">${atk.cost.map(c => `<div class="energy-icon energy-${c}"></div>`).join('')}</div>`; 
            } else { 
                costHtml = `<div style="display:flex; flex-wrap:wrap; width:45px; gap:4px; flex-shrink:0;">${atk.cost.map(c => `<div class="energy-icon energy-${c}"></div>`).join('')}</div>`; 
            }
            
            if (isMyActive) {
                const hasEnergy = canUseAttack(p, atk);
                const rowClass = hasEnergy ? 'attack-ready' : 'attack-disabled';
                attacksHtml += `<div class="attack-row ${rowClass}" style="padding:15px; font-size:18px; margin-top:10px; border: 2px solid #aaa; flex-direction:column; align-items:stretch;" onclick="event.stopPropagation(); if(${hasEnergy}) { executeAttackFromInspect(${t}, ${aIdx}); } else { showAlert('能量不足！'); }">
                    <div style="display:flex; width:100%; justify-content:space-between; align-items:center; gap:10px;">
                        ${costHtml}
                        <span style="flex:1; text-align:left; font-weight:bold; color: inherit; font-size:20px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${atk.n}${atk.desc ? ' ✨' : ''}</span>
                        <span style="font-size:26px; font-weight:bold; color: inherit; flex-shrink:0;">${atk.d}</span>
                    </div>
                    ${atk.desc ? `<div style="font-size:14px; color:inherit; margin-top:8px; text-align:left; opacity: 0.8; border-top:1px dashed rgba(0,0,0,0.2); padding-top:8px; word-break:break-all;">💡 ${atk.desc}</div>` : ''}
                </div>`;
            } else {
                attacksHtml += `<div class="attack-row" style="flex-direction:column; align-items:stretch; padding:10px;">
                    <div style="display:flex; width:100%; justify-content:space-between; align-items:center; gap:8px;">
                        ${costHtml}
                        <span style="flex:1; text-align:left; font-weight:bold; font-size:16px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${atk.n}</span>
                        <span style="font-size:18px; font-weight:bold; flex-shrink:0;">${atk.d}</span>
                    </div>
                    ${atk.desc ? `<div style="font-size:12px; color:#444; margin-top:6px; text-align:left; border-top:1px dashed rgba(0,0,0,0.2); padding-top:6px; word-break:break-all;">💡 ${atk.desc}</div>` : ''}
                </div>`;
            }
        });

        const cardHtml = `
            <div class="card type-${p.type}" style="cursor: default;">
                <div class="card-header"><div><div style="margin-bottom:5px;">${statusHtml}</div><span style="font-size:18px;">${p.name}</span></div>
                    <div style="text-align:right;"><span style="color: ${p.currHp < p.hp*0.3 ? '#ff0000' : '#000'}; font-weight:900;">HP ${p.currHp}/${p.hp}</span></div>
                </div>
                <div class="hp-bar" style="height:12px;"><div class="hp-fill" style="width:${(p.currHp/p.hp)*100}%; background:${(p.currHp/p.hp)*100 < 30 ? '#ff4422' : '#4caf50'}"></div></div>
                <div class="card-img">
                    <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${p.id}.png">
                    <div class="buff-container">${buffHtml}</div>
                </div>
                <div class="energy-container" style="padding: 5px;">已附著: ${p.attachedEnergy.length === 0 ? '無' : p.attachedEnergy.map(e => `<div class="energy-icon energy-${e}"></div>`).join('')}</div>
                <div style="margin-top:15px; flex:1;">${attacksHtml}</div>
                <div style="font-size:12px; opacity:0.8; margin-top:15px; display:flex; justify-content:space-between; border-top:1px solid rgba(0,0,0,0.2); padding-top:5px;"><span>弱點: ${getTypeName(p.weakness)} x1.5</span><span>抗性: ${resText}</span></div>
            </div>`;
        document.getElementById('inspect-content').innerHTML = cardHtml; document.getElementById('inspect-modal').style.display = 'flex';
    }
    function closeInspect() { document.getElementById('inspect-modal').style.display = 'none'; }

    function render() {
        const drawSide = (t) => {
            const team = state.teams[t]; const isMyTurn = (t === state.currentTeam && state.step !== 'setup');
            document.getElementById(`side-${t}`).className = `team-container ${isMyTurn ? 'active-team' : ''}`;
            const lives = 3 - team.lostLives; let fireHtml = ''; for(let i=0; i<3; i++) { if(i < lives) fireHtml += '<span style="text-shadow: 0 0 5px red;">🔥</span>'; else fireHtml += '<span style="opacity:0.3; filter:grayscale(100%);">🔥</span>'; }
            document.getElementById(`header-${t}`).innerHTML = `<h2 style="color: #ffcb05; margin:0; text-shadow: 0 0 8px rgba(255,203,5,0.6);">TEAM ${t}</h2><span style="font-size:24px;">${fireHtml}</span>`;

            let actHtml = '', benHtml = '';
            team.pokemon.forEach((p, pIdx) => {
                const isActive = (pIdx === team.activeIdx); const hpPer = (p.currHp / p.hp) * 100; let isValidTarget = false;
                if(isMyTurn && state.selectedHandItem) {
                    const hCard = state.selectedHandItem.data;
                    if(hCard.cardType === 'energy' && p.currHp > 0) isValidTarget = true;
                    if(hCard.target === 'ally' && p.currHp > 0) isValidTarget = true;
                    if(hCard.target === 'active_ally' && isActive && p.currHp > 0) isValidTarget = true;
                    if(hCard.target === 'bench' && !isActive && p.currHp > 0) isValidTarget = true;
                    if(hCard.target === 'dead_ally' && p.currHp <= 0) isValidTarget = true;
                }
                if (!isMyTurn && state.step !== 'setup') {
                    if (state.selectedHandItem && state.selectedHandItem.data.target === 'enemy_bench' && !isActive && p.currHp > 0) isValidTarget = true;
                    if (state.step === 'select_enemy_bench' && !isActive && p.currHp > 0) isValidTarget = true;
                    if (state.step === 'select_transform_target' && p.currHp > 0) isValidTarget = true;
                }

                const resText = p.resistance.type !== 'none' && p.resistance.val > 0 ? `${getTypeName(p.resistance.type)} -${p.resistance.val}` : '無';
                let statusHtml = ''; if (p.status.poison) statusHtml += '<span class="status-tag status-poison">中毒</span>'; if (p.status.burn) statusHtml += '<span class="status-tag status-burn">灼伤</span>'; if (p.status.asleep) statusHtml += '<span class="status-tag status-asleep">睡眠</span>'; if (p.status.confused) statusHtml += '<span class="status-tag status-confused">混亂</span>'; if (p.status.paralyze) statusHtml += '<span class="status-tag status-paralyze">麻痺</span>'; if (p.status.immune_next) statusHtml += '<span class="status-tag status-immune">免傷</span>'; if (p.status.cant_attack > 0) statusHtml += '<span class="status-tag status-cant-act">無法攻擊</span>';
                
                let buffHtml = ''; 
                if (p.buff.turns > 0) buffHtml += `<div class="item-tag">💪攻擊+${p.buff.dmg}(${p.buff.turns})</div>`; 
                if (p.buff.hasFocusSash) buffHtml += `<div class="item-tag">🎗️氣勢披帶</div>`;
                if (p.buff.fullFaceGuard > 0) buffHtml += `<div class="item-tag">🛡️傷害-20(${p.buff.fullFaceGuard})</div>`; 
                if (p.buff.potHelmet > 0) buffHtml += `<div class="item-tag">🪖傷害-40(${p.buff.potHelmet})</div>`;

                const deadClass = p.currHp <= 0 ? (isValidTarget ? 'dead revivable' : 'dead') : '';
                const headerClass = isActive ? 'active-header' : 'bench-header';

                let cardHtml = `
                    <div class="card type-${p.type} ${isActive ? 'card-active is-active-fighter' : 'card-bench'} ${deadClass} ${isValidTarget && p.currHp>0 ? 'valid-target' : ''}" id="${p.uid}" onclick="clickPokemon(${t}, ${pIdx})">
                        <div class="inspect-btn" onclick="event.stopPropagation(); inspectCard(${t}, ${pIdx})">🔍</div>
                        <div class="${headerClass}"><span class="name-text">${p.name}</span><span class="hp-text" style="color: ${hpPer < 30 ? '#ff0000' : '#000'};">HP ${p.currHp}/${p.hp}</span></div>
                        <div class="status-container">${statusHtml}</div>
                        <div class="hp-bar"><div class="hp-fill" style="width:${Math.max(0, hpPer)}%; background:${hpPer < 30 ? '#ff4422' : '#4caf50'}"></div></div>
                        <div class="card-img">
                            <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${p.id}.png">
                            <div class="buff-container">${buffHtml}</div>
                        </div>
                        <div class="energy-container">${p.attachedEnergy.map(e => `<div class="energy-icon energy-${e}"></div>`).join('')}</div>
                `;

                if(isActive) {
                    cardHtml += `<div style="margin-top:5px">
                        ${p.attacks.map((atk, aIdx) => {
                            const hasEnergy = canUseAttack(p, atk); const rowClass = (hasEnergy && isMyTurn && state.step === 'action') ? 'attack-ready' : 'attack-disabled';
                            let costHtml = ''; if (atk.cost.length === 4) { costHtml = `<div style="display:grid; grid-template-columns:1fr 1fr; gap:2px; width:28px;">${atk.cost.map(c => `<div class="energy-icon energy-${c}"></div>`).join('')}</div>`; } else { costHtml = `<div style="display:flex; flex-wrap:wrap; max-width:45px; gap:2px;">${atk.cost.map(c => `<div class="energy-icon energy-${c}"></div>`).join('')}</div>`; }
                            return `<div class="attack-row ${rowClass}" onclick="event.stopPropagation(); executeAttack(event, ${t}, ${aIdx});"><div class="attack-cost">${costHtml}</div><span style="flex:1; margin-left:5px; font-weight:bold; white-space:nowrap; overflow:hidden;">${atk.n}${atk.desc ? '<span class="attack-special-icon">✨</span>' : ''}</span><span>${atk.d}</span></div>`;
                        }).join('')}
                    </div><div style="font-size:9px; opacity:0.8; margin-top:5px; display:flex; justify-content:space-between;"><span>弱點: ${getTypeName(p.weakness)} x1.5</span><span>抗性: ${resText}</span></div>`;
                } else {
                    cardHtml += `<div class="bench-attack-preview">${p.attacks.map(atk => `<div>${atk.cost.map(c => `<div class="energy-icon energy-${c}" style="width:8px; height:8px;"></div>`).join('')}</div>`).join('')}</div>`;
                }
                cardHtml += `</div>`;
                if(isActive) actHtml = `<div class="active-zone">${cardHtml}</div>`; else benHtml += cardHtml;
            });
            
            if (t === 1) document.getElementById(`field-${t}`).innerHTML = `<div class="bench-grid">${benHtml}</div>${actHtml}`; else document.getElementById(`field-${t}`).innerHTML = `${actHtml}<div class="bench-grid">${benHtml}</div>`;
            const handDiv = document.getElementById(`hand-${t}`); handDiv.innerHTML = '';
            team.hand.forEach((card, cIdx) => {
                const isSelected = (state.selectedHandItem && state.selectedHandItem.index === cIdx); const descText = card.desc ? card.desc.replace(/'/g, "\\'") : '';
                if(card.cardType === 'energy') {
                    handDiv.innerHTML += `<div class="hand-card hand-energy energy-${card.type} ${isSelected ? 'selected' : ''}" onclick="selectHandCard(${cIdx})" onmouseenter="showHandTooltip(${t}, '💡 提供 1 個 [${getTypeName(card.type)}] 能量')" onmouseleave="hideHandTooltip(${t})"><div class="energy-icon energy-${card.type}" style="width:25px;height:25px;margin-bottom:5px;"></div><div style="color:white;text-shadow:1px 1px 2px #000;">能量</div></div>`;
                } else {
                    handDiv.innerHTML += `<div class="hand-card hand-trainer ${isSelected ? 'selected' : ''}" onclick="selectHandCard(${cIdx})" onmouseenter="showHandTooltip(${t}, '💡 ${descText}')" onmouseleave="hideHandTooltip(${t})"><div style="font-size:24px; margin-bottom:2px;">${card.icon}</div><div>${card.name}</div></div>`;
                }
            });
        };

        drawSide(1); drawSide(2);
        
        const turnInd = document.getElementById('turn-indicator');
        const actionHint = document.getElementById('action-hint');
        const setupUI = document.getElementById('setup-ui');
        const endBtn = document.getElementById('end-turn-btn');
        
        if (state.step === 'setup') {
            turnInd.style.display = 'none'; actionHint.style.display = 'none'; endBtn.style.display = 'none'; setupUI.style.display = 'flex';
            document.getElementById('btn-redraw').disabled = state.redrawsLeft <= 0; document.getElementById('btn-redraw').textContent = `🔄 重抽卡牌 (${state.redrawsLeft})`;
        } else {
            setupUI.style.display = 'none'; turnInd.style.display = 'block'; actionHint.style.display = 'block';
            turnInd.textContent = state.step === 'must_swap' ? `⚠️ TEAM ${state.currentTeam} 必須換人！` : `▶ TEAM ${state.currentTeam} 的回合`;
            turnInd.style.color = '#ffcb05';
            endBtn.style.display = state.step === 'action' ? 'block' : 'none';
        }
    }
</script>
</body>
</html>
